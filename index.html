  --fg:#cccccc; --fg-dim:#9d9d9d; --fg-faint:#6e7681; --fg-bright:#ffffff;
  --accent:#34d399; --accent-soft:rgba(52,211,153,.14);
  --rose:#fb7185; --amber:#fbbf24; --blue:#4fc1ff; --emerald:#34d399;
  --shadow:0 8px 30px rgba(0,0,0,.45);
  --radius:8px; --fs:15px;
  --mono:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;
  --sans:"Segoe UI",system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
  --sidebar-w:300px; --chat-w:380px;
}
[data-theme="light"]{
  --bg:#ffffff; --bg2:#f3f3f3; --bg3:#ececec; --titlebar:#dddddd; --activitybar:#2c2c2c;
  --sidebar:#f3f3f3; --editor:#ffffff; --tabbar:#ececec; --tab-active:#ffffff;
  --border:#e0e0e0; --border2:#d0d0d0;
  --fg:#3b3b3b; --fg-dim:#616161; --fg-faint:#8a8a8a; --fg-bright:#1a1a1a;
  --accent:#059669; --accent-soft:rgba(5,150,105,.12);
  --shadow:0 8px 30px rgba(0,0,0,.14);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--sans);font-size:var(--fs);color:var(--fg);background:var(--bg);
  overflow:hidden;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
:focus-visible{outline:2px solid var(--accent);outline-offset:1px;border-radius:4px}

/* ---------- title bar ---------- */
.titlebar{height:38px;background:var(--titlebar);display:flex;align-items:center;
  padding:0 8px;gap:8px;flex-shrink:0;border-bottom:1px solid var(--border);user-select:none}
.traffic{display:flex;gap:8px;padding:0 4px}
.traffic i{width:12px;height:12px;border-radius:50%;display:block}
.traffic i:nth-child(1){background:#ff5f57}.traffic i:nth-child(2){background:#febc2e}.traffic i:nth-child(3){background:#28c840}
.hamburger{display:none}
.title-center{flex:1;text-align:center;font-size:12.5px;color:var(--fg-dim);
  display:flex;align-items:center;justify-content:center;gap:8px;overflow:hidden;white-space:nowrap}
.dv-mark{display:inline-flex;align-items:center;gap:6px;text-decoration:none;color:var(--fg-dim)}
.dv-mark svg{display:block}
.dv-mark b{color:var(--fg);font-weight:600}
.tb-actions{display:flex;align-items:center;gap:4px}
.tb-btn{background:none;border:none;color:var(--fg-dim);cursor:pointer;height:28px;min-width:30px;padding:0 8px;
  border-radius:5px;font-size:13px;display:flex;align-items:center;gap:5px;justify-content:center}
.tb-btn:hover{background:rgba(127,127,127,.18);color:var(--fg-bright)}
.tb-btn.wide{font-size:12px}
.tb-btn.askbtn{border:1px solid var(--border2);font-size:12px}
.tb-btn.askbtn.on{background:var(--accent-soft);color:var(--fg-bright);border-color:var(--accent)}

/* ---------- body grid ---------- */
.shell{flex:1;display:flex;min-height:0;position:relative}
.activitybar{width:48px;background:var(--activitybar);display:flex;flex-direction:column;
  align-items:center;padding:8px 0;gap:4px;flex-shrink:0}
.act{width:40px;height:40px;border:none;background:none;cursor:pointer;border-radius:6px;
  color:#bdbdbd;display:flex;align-items:center;justify-content:center;position:relative}
.act:hover{color:#fff}
.act.active{color:#fff}
.act.active::before{content:"";position:absolute;left:-8px;top:8px;bottom:8px;width:2px;background:#fff;border-radius:2px}
.act svg{width:22px;height:22px}
.act-spacer{flex:1}
.act .badge{position:absolute;top:6px;right:5px;width:7px;height:7px;border-radius:50%;background:var(--accent);display:none}
.act.has-badge .badge{display:block}

.sidebar{width:var(--sidebar-w);background:var(--sidebar);
  display:flex;flex-direction:column;flex-shrink:0;min-height:0;min-width:180px;max-width:600px}
.sidebar.collapsed{display:none}
.sb-head{padding:10px 14px 6px;font-size:11px;letter-spacing:.09em;text-transform:uppercase;
  color:var(--fg-faint);display:flex;align-items:center;justify-content:space-between;gap:8px}
.sb-head .sb-x{display:none;background:none;border:none;color:var(--fg-faint);cursor:pointer;font-size:18px;line-height:1}
.sb-search{margin:4px 12px 8px;position:relative}
.sb-search input{width:100%;background:var(--bg);border:1px solid var(--border2);color:var(--fg);
  border-radius:5px;padding:6px 28px 6px 28px;font-size:12.5px;font-family:var(--sans);outline:none}
.sb-search input:focus{border-color:var(--accent)}
.sb-search .si{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--fg-faint);font-size:12px}
.sb-search .sclear{position:absolute;right:6px;top:50%;transform:translateY(-50%);color:var(--fg-faint);
  cursor:pointer;border:none;background:none;font-size:14px;display:none}
.sb-scroll{flex:1;overflow-y:auto;min-height:0}
.sb-scroll::-webkit-scrollbar{width:10px}.sb-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:6px}

/* ---- On this page (subtopics) ---- */
.otp{border-bottom:1px solid var(--border);background:var(--bg2);display:none}
.otp.show{display:block}
.otp-head{display:flex;align-items:center;gap:7px;padding:8px 12px 7px 14px;cursor:pointer;
  font-size:10.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--fg-faint);user-select:none}
.otp-head .chev{font-size:9px;transition:transform .15s;width:9px}
.otp.open .otp-head .chev{transform:rotate(90deg)}
.otp-head .otp-code{margin-left:auto;font-family:var(--mono);font-size:9.5px;color:var(--otpAccent,var(--accent));
  border:1px solid var(--otpAccent,var(--accent));border-radius:4px;padding:1px 5px}
.otp-cur{padding:1px 14px 7px 30px;font-size:12px;color:var(--fg-bright);font-weight:600;display:none}
.otp.open .otp-cur{display:block}
.otp-list{display:none;padding:0 0 8px}
.otp.open .otp-list{display:block}
.otp-list a{display:flex;gap:9px;align-items:baseline;padding:4px 12px 4px 30px;cursor:pointer;
  font-size:12.3px;color:var(--fg-dim);text-decoration:none;border-left:2px solid transparent}
.otp-list a:hover{background:rgba(127,127,127,.10);color:var(--fg)}
.otp-list a.cur{color:var(--fg-bright);border-left-color:var(--otpAccent,var(--accent))}
.otp-list a .on{font-family:var(--mono);font-size:10px;color:var(--fg-faint);min-width:16px}

.unit-label{padding:10px 14px 3px;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-faint)}
.grp{user-select:none}
.grp-head{display:flex;align-items:center;gap:6px;padding:5px 12px 5px 14px;cursor:pointer;
  font-size:13.5px;color:var(--fg);position:relative}
.grp-head:hover{background:rgba(127,127,127,.10)}
.grp-head .chev{transition:transform .15s;font-size:10px;color:var(--fg-faint);width:10px;flex-shrink:0}
.grp.open .chev{transform:rotate(90deg)}
.grp-head .gname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.grp-head .gcode{font-family:var(--mono);font-size:10px;color:var(--fg-faint);
  border:1px solid var(--border2);border-radius:4px;padding:1px 5px}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.kids{display:none}.grp.open .kids{display:block}
.leaf{display:flex;align-items:center;gap:8px;padding:5px 12px 5px 34px;cursor:pointer;
  font-size:13px;color:var(--fg-dim);position:relative}
.leaf:hover{background:rgba(127,127,127,.10);color:var(--fg)}
.leaf.sel{background:var(--accent-soft);color:var(--fg-bright)}
.leaf.sel::before{content:"";position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--accent)}
.leaf .knum{font-family:var(--mono);font-size:10.5px;color:var(--fg-faint);flex-shrink:0;min-width:34px}
.leaf .kt{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.leaf .built{margin-left:auto;width:6px;height:6px;border-radius:50%;background:#28c840;flex-shrink:0;display:none}
.leaf.is-built .built{display:block}
.fileicon{width:14px;flex-shrink:0;color:var(--fg-faint)}

/* nested current-module sections inside the tree */
.subnav{display:none;padding:2px 0 4px}
.leaf.sel + .subnav.show{display:block}
.subnav a{display:flex;gap:8px;align-items:baseline;padding:3px 12px 3px 52px;cursor:pointer;
  font-size:11.8px;color:var(--fg-faint);text-decoration:none;border-left:2px solid transparent}
.subnav a:hover{color:var(--fg);background:rgba(127,127,127,.08)}
.subnav a.cur{color:var(--fg-bright);border-left-color:var(--accent)}
.subnav a .sn{font-family:var(--mono);font-size:9.5px;min-width:15px;opacity:.7}

/* ---------- resize handles ---------- */
.resizer{flex:0 0 5px;cursor:col-resize;background:transparent;position:relative;z-index:8}
.resizer::after{content:"";position:absolute;inset:0 2px;background:transparent}
.resizer:hover::after,.resizer.drag::after{background:var(--accent)}
.resizer.hidden{display:none}

/* ---------- editor / content ---------- */
.editor{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--editor)}
.tabbar{height:36px;background:var(--tabbar);display:flex;align-items:stretch;flex-shrink:0;
  border-bottom:1px solid var(--border);overflow-x:auto}
.tabbar::-webkit-scrollbar{height:0}
.etab{display:flex;align-items:center;gap:7px;padding:0 12px;cursor:pointer;font-size:12.5px;
  color:var(--fg-faint);border-right:1px solid var(--border);white-space:nowrap;position:relative;max-width:230px}
.etab.active{background:var(--tab-active);color:var(--fg-bright)}
.etab.active::after{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--tabaccent,var(--accent))}
.etab .x{opacity:.5;border:none;background:none;color:inherit;cursor:pointer;font-size:14px;
  border-radius:3px;width:16px;height:16px;line-height:1;display:flex;align-items:center;justify-content:center}
.etab .x:hover{opacity:1;background:rgba(127,127,127,.25)}
.etab .ti{overflow:hidden;text-overflow:ellipsis}
.content{flex:1;overflow-y:auto;position:relative}
.content::-webkit-scrollbar{width:12px}.content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:6px}
.viewer{position:absolute;inset:0;border:none;width:100%;height:100%;background:#fff;display:none}
.viewer.show{display:block}

/* ---------- welcome ---------- */
.pad{padding:42px 48px 80px;max-width:1080px;margin:0 auto}
.hero h1{font-size:30px;font-weight:300;color:var(--fg-bright);letter-spacing:-.4px}
.hero h1 b{font-weight:700}
.hero .sub{margin-top:8px;color:var(--fg-dim);font-size:14.5px}
.hero .pills{margin-top:18px;display:flex;flex-wrap:wrap;gap:8px}
.hpill{font-size:12px;border:1px solid var(--border2);border-radius:20px;padding:5px 13px;
  color:var(--fg-dim);display:flex;align-items:center;gap:7px}
.hpill .dot{width:8px;height:8px}
.divider{height:1px;background:var(--border);margin:30px 0}
.sect-h{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-faint);margin-bottom:14px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:14px}
.ccard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px 16px 15px;cursor:pointer;transition:transform .12s,border-color .12s,box-shadow .12s;
  position:relative;overflow:hidden}
.ccard:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--caccent)}
.ccard .bar{position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--caccent)}
.ccard .ctop{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.ccard .ccode{font-family:var(--mono);font-size:10.5px;color:var(--caccent);
  border:1px solid var(--caccent);border-radius:5px;padding:2px 7px;font-weight:600}
.ccard .cunit{font-size:11px;color:var(--fg-faint);text-transform:uppercase;letter-spacing:.06em}
.ccard h3{font-size:17px;color:var(--fg-bright);font-weight:600;margin-bottom:7px}
.ccard p{font-size:12.8px;color:var(--fg-dim);line-height:1.5}
.ccard .cmeta{margin-top:12px;display:flex;align-items:center;justify-content:space-between;
  font-size:11.5px;color:var(--fg-faint)}
.ccard .cmeta b{color:var(--caccent)}
.cmeta-r{display:flex;align-items:center;gap:9px}
.card-pdf,.kk-pdf{font:600 10.5px/1 var(--mono,ui-monospace,monospace);color:var(--caccent,#7c8cf8);
  border:1px solid var(--caccent,#7c8cf8);padding:3px 7px;border-radius:6px;opacity:.8;white-space:nowrap;
  cursor:pointer;transition:opacity .12s,background .12s,color .12s;flex-shrink:0}
.card-pdf:hover,.kk-pdf:hover{opacity:1;background:var(--caccent,#7c8cf8);color:#0b1020}
.kk-row .kk-pdf{margin-left:8px}
/* hub uses the single bottom-right floating launcher; titlebar Ask is hidden */
#askToggle{display:none!important}

/* ---------- chapter overview ---------- */
.ov-head{display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap}
.ov-badge{font-family:var(--mono);font-size:13px;font-weight:700;color:#fff;
  background:var(--caccent);border-radius:9px;padding:7px 12px;flex-shrink:0}
.ov-titles h2{font-size:25px;color:var(--fg-bright);font-weight:700}
.ov-titles .ov-meta{color:var(--fg-dim);font-size:13px;margin-top:3px}
.ov-block{background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--caccent);
  border-radius:var(--radius);padding:15px 18px;margin-top:18px}
.ov-block .lbl{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--caccent);
  font-weight:600;margin-bottom:6px}
.ov-block p{color:var(--fg);font-size:14px;line-height:1.55}
.ov-block.assess p{color:var(--fg-dim);font-size:13px}
.kk-list{margin-top:24px;display:flex;flex-direction:column;gap:9px}
.kk-row{display:flex;align-items:center;gap:14px;background:var(--bg2);border:1px solid var(--border);
  border-radius:7px;padding:12px 15px;cursor:pointer;transition:border-color .12s,background .12s;text-align:left}
.kk-row:hover{border-color:var(--caccent);background:var(--bg3)}
.kk-row .kn{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--caccent);min-width:42px;flex-shrink:0}
.kk-row .kc{flex:1;min-width:0}
.kk-row .kc h4{font-size:14.5px;color:var(--fg-bright);font-weight:600;margin-bottom:2px}
.kk-row .kc p{font-size:12.6px;color:var(--fg-dim);line-height:1.45}
.kk-row .karrow{color:var(--fg-faint);flex-shrink:0;font-size:16px}
.kk-row:hover .karrow{color:var(--caccent)}
.kk-row .kstatus{font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:10px;flex-shrink:0;
  border:1px solid var(--border2);color:var(--fg-faint)}
.kk-row.is-built .kstatus{border-color:#28c840;color:#28c840}

/* ---------- module-in-progress panel ---------- */
.mip{max-width:680px;margin:60px auto;text-align:center;padding:0 30px}
.mip .micon{width:74px;height:74px;border-radius:18px;background:var(--caccent);opacity:.16;margin:0 auto 22px;
  display:flex;align-items:center;justify-content:center}
.mip .mwrap{position:relative}
.mip .msvg{position:absolute;top:14px;left:50%;transform:translateX(-50%);color:var(--caccent)}
.mip .mcode{font-family:var(--mono);font-size:13px;color:var(--caccent);font-weight:700;
  border:1px solid var(--caccent);border-radius:6px;padding:3px 10px;display:inline-block;margin-bottom:14px}
.mip h2{font-size:23px;color:var(--fg-bright);font-weight:700;margin-bottom:10px}
.mip p{color:var(--fg-dim);font-size:14px;line-height:1.6;margin-bottom:8px}
.mip .fname{font-family:var(--mono);font-size:12.5px;color:var(--fg);background:var(--bg2);
  border:1px solid var(--border);border-radius:6px;padding:8px 12px;display:inline-block;margin:14px 0}
.mip .mbtns{margin-top:22px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.mbtn{font-size:13px;padding:9px 18px;border-radius:7px;border:1px solid var(--border2);
  background:var(--bg2);color:var(--fg);cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:7px}
.mbtn:hover{border-color:var(--caccent);color:var(--fg-bright)}
.mbtn.primary{background:var(--caccent);border-color:var(--caccent);color:#10242e;font-weight:600}
.mbtn.primary:hover{filter:brightness(1.08);color:#10242e}

/* ---------- status bar ---------- */
.statusbar{height:24px;background:var(--accent);color:#10242e;display:flex;align-items:center;
  padding:0 12px;font-size:11.5px;gap:16px;flex-shrink:0;font-weight:500}
[data-theme="light"] .statusbar{color:#fff}
.statusbar .si{display:flex;align-items:center;gap:5px}
.statusbar .si.clickable{cursor:pointer}
.statusbar .si.clickable:hover{text-decoration:underline}
.statusbar .sright{margin-left:auto;display:flex;gap:16px}

/* ====================================================================
   ASK THIS SITE — chat panel
   ==================================================================== */
.chat{width:var(--chat-w);min-width:280px;max-width:680px;background:var(--sidebar);
  border-left:1px solid var(--border);display:flex;flex-direction:column;min-height:0;flex-shrink:0}
.chat.collapsed{display:none}
.chat-head{padding:9px 10px 9px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.chat-head .ttl{font-size:12.5px;font-weight:600;color:var(--fg-bright);display:flex;align-items:center;gap:7px}
.chat-head .ttl svg{color:var(--accent)}
.chat-head .hx{margin-left:auto;display:flex;gap:2px}
.chat-head .hx button{background:none;border:none;color:var(--fg-faint);cursor:pointer;width:28px;height:26px;
  border-radius:5px;font-size:14px;display:flex;align-items:center;justify-content:center}
.chat-head .hx button:hover{background:rgba(127,127,127,.18);color:var(--fg-bright)}

.chat-mode{display:flex;gap:0;margin:10px 12px 4px;background:var(--bg);border:1px solid var(--border2);
  border-radius:7px;padding:3px}
.chat-mode button{flex:1;border:none;background:none;color:var(--fg-dim);cursor:pointer;
  padding:6px 8px;font-size:12px;border-radius:5px;font-family:var(--sans);display:flex;
  align-items:center;justify-content:center;gap:6px}
.chat-mode button.on{background:var(--accent-soft);color:var(--fg-bright);font-weight:600}
.chat-mode button svg{width:14px;height:14px}

.mode-note{margin:2px 14px 0;font-size:11px;color:var(--fg-faint);line-height:1.45}
.mode-note a{color:var(--accent);cursor:pointer;text-decoration:none}
.mode-note a:hover{text-decoration:underline}

/* AI setup card */
.ai-setup{margin:10px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:13px 14px;display:none}
.ai-setup.show{display:block}
.ai-setup h4{font-size:13px;color:var(--fg-bright);margin-bottom:5px;display:flex;align-items:center;gap:7px}
.ai-setup p{font-size:11.6px;color:var(--fg-dim);line-height:1.5;margin-bottom:5px}
.ai-setup .warn{color:var(--amber)}
.ai-setup .ok{color:var(--accent)}
.ai-btn{margin-top:9px;width:100%;border:1px solid var(--accent);background:var(--accent-soft);color:var(--fg-bright);
  cursor:pointer;padding:9px 12px;border-radius:6px;font-size:12.5px;font-weight:600;font-family:var(--sans);
  display:flex;align-items:center;justify-content:center;gap:8px}
.ai-btn:hover{filter:brightness(1.08)}
.ai-btn:disabled{opacity:.6;cursor:default;filter:none}
.ai-prog{margin-top:10px;display:none}
.ai-prog.show{display:block}
.ai-prog .bar{height:6px;background:var(--bg);border:1px solid var(--border2);border-radius:6px;overflow:hidden}
.ai-prog .bar i{display:block;height:100%;width:0;background:var(--accent);transition:width .3s}
.ai-prog .ptxt{margin-top:6px;font-size:11px;color:var(--fg-dim);font-family:var(--mono);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.chat-body{flex:1;overflow-y:auto;padding:6px 12px 12px;min-height:0;display:flex;flex-direction:column;gap:12px}
.chat-body::-webkit-scrollbar{width:9px}.chat-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:6px}

.cmsg{display:flex;flex-direction:column;gap:5px;max-width:100%}
.cmsg .who{font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--fg-faint)}
.cmsg.user .bub{align-self:flex-end;background:var(--accent-soft);color:var(--fg-bright);
  border:1px solid var(--accent);border-radius:10px 10px 2px 10px}
.cmsg.user .who{text-align:right}
.cmsg .bub{padding:9px 12px;border-radius:10px 10px 10px 2px;background:var(--bg2);border:1px solid var(--border);
  font-size:13.3px;line-height:1.55;color:var(--fg);white-space:pre-wrap;word-wrap:break-word}
.cmsg .bub b,.cmsg .bub strong{color:var(--fg-bright)}
.cmsg .bub code{font-family:var(--mono);font-size:12px;background:var(--bg3);padding:1px 5px;border-radius:4px}
.cmsg .bub .cite{display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;
  font-size:10px;font-family:var(--mono);background:var(--accent);color:#10242e;border-radius:4px;
  padding:0 3px;cursor:pointer;vertical-align:baseline;margin:0 1px;font-weight:700}
.typing{display:inline-flex;gap:3px;padding:3px 0}
.typing i{width:6px;height:6px;border-radius:50%;background:var(--fg-faint);animation:blink 1.2s infinite both}
.typing i:nth-child(2){animation-delay:.2s}.typing i:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.25}40%{opacity:1}}

/* search results in chat */
.sresults{display:flex;flex-direction:column;gap:8px}
.sresult{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer;
  transition:border-color .12s,background .12s;text-align:left;border-left:3px solid var(--raccent,var(--accent))}
.sresult:hover{border-color:var(--raccent,var(--accent));background:var(--bg3)}
.sresult .rtop{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap}
.sresult .rcode{font-family:var(--mono);font-size:9.5px;font-weight:700;color:var(--raccent,var(--accent));
  border:1px solid var(--raccent,var(--accent));border-radius:4px;padding:1px 5px}
.sresult .rmod{font-size:12px;color:var(--fg-bright);font-weight:600}
.sresult .rsect{font-size:11.5px;color:var(--fg-dim);margin-bottom:3px}
.sresult .rtext{font-size:11.5px;color:var(--fg-faint);line-height:1.45;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sresult mark{background:var(--accent-soft);color:var(--fg-bright);border-radius:2px;padding:0 1px}

.src-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:3px}
.src-chip{font-size:10.5px;border:1px solid var(--border2);border-radius:20px;padding:3px 9px;color:var(--fg-dim);
  cursor:pointer;display:inline-flex;align-items:center;gap:5px;background:var(--bg2)}
.src-chip:hover{border-color:var(--accent);color:var(--fg-bright)}
.src-chip .sc-n{font-family:var(--mono);font-size:9px;background:var(--accent);color:#10242e;border-radius:3px;
  padding:0 4px;font-weight:700}

.chat-empty{padding:20px 6px;color:var(--fg-faint);font-size:12.5px;line-height:1.6}
.chat-empty h3{color:var(--fg-bright);font-size:14px;margin-bottom:8px;font-weight:600}
.chip-row{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}
.exq{font-size:11.8px;border:1px solid var(--border2);border-radius:18px;padding:6px 12px;color:var(--fg-dim);
  cursor:pointer;background:var(--bg2)}
.exq:hover{border-color:var(--accent);color:var(--fg-bright)}

.chat-foot{border-top:1px solid var(--border);padding:10px 12px;display:flex;gap:8px;align-items:flex-end}
.chat-foot textarea{flex:1;background:var(--bg);border:1px solid var(--border2);color:var(--fg);border-radius:8px;
  padding:9px 11px;font-size:13px;font-family:var(--sans);resize:none;outline:none;max-height:120px;line-height:1.4}
.chat-foot textarea:focus{border-color:var(--accent)}
.chat-foot .send{flex-shrink:0;width:38px;height:38px;border:none;border-radius:8px;background:var(--accent);
  color:#10242e;cursor:pointer;display:flex;align-items:center;justify-content:center}
.chat-foot .send:hover{filter:brightness(1.08)}
.chat-foot .send:disabled{opacity:.45;cursor:default;filter:none}

/* backdrop for mobile drawers */
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:40;display:none}
.backdrop.show{display:block}

   MOBILE
   ==================================================================== */
@media (max-width:768px){
  .titlebar{height:44px;padding:0 6px}
  .traffic{display:none}
  .hamburger{display:flex}
  .title-center .longt{display:none}
  .tb-btn{height:34px;min-width:36px}
  .tb-btn.wide .themeTxt{display:none}

  .activitybar{display:none}

  .sidebar{position:fixed;top:44px;bottom:0;left:0;z-index:50;width:84vw;max-width:340px;
    box-shadow:var(--shadow);transform:translateX(-105%);transition:transform .22s ease;display:flex}
  .sidebar.collapsed{display:flex;transform:translateX(-105%)}
  .sidebar.mobile-open{transform:translateX(0)}
  .sb-head .sb-x{display:block}
  .leaf{padding-top:9px;padding-bottom:9px}
  .grp-head{padding-top:9px;padding-bottom:9px}

  .resizer{display:none}

  .chat{position:fixed;top:44px;bottom:0;right:0;z-index:50;width:100%;max-width:100%;
    transform:translateX(105%);transition:transform .22s ease;display:flex;border-left:none}
  .chat.collapsed{display:flex;transform:translateX(105%)}
  .chat.mobile-open{transform:translateX(0)}

  .pad{padding:26px 18px 70px}
  .hero h1{font-size:25px}
  .cards{grid-template-columns:1fr}
  .statusbar{font-size:10.5px;gap:10px}
  .statusbar .sright .hideSm{display:none}
}
@media (max-width:768px) and (display-mode:standalone){

}

.pdfcat-h{font-weight:600;font-size:13px;margin-bottom:8px;display:flex;align-items:center;gap:8px}

.pdfchip:hover{border-color:var(--accent,#7c8cf8);color:var(--fg,#e6edf3)}

atters when that population is experiencing environmental change.", "file": "u3o1-kk02.html"}, {"num": "KK03", "title": "Ecosystem services", "blurb": "Ecosystems as a source of renewable services for human health and well-being: provisioning, regulating, supporting and cultural services.", "file": "u3o1-kk03.html"}, {"num": "KK04", "title": "Mass extinctions & diversification", "blurb": "Evidence of variation in the rate and extent of biodiversity change over time — mass extinctions and rapid diversification inferred from the fossil record.", "file": "u3o1-kk04.html"}, {"num": "KK05", "title": "Natural drivers of change", "blurb": "Natural changes over different time scales that shape ecosystem diversity, endemism, hotspots and extinction — eruptions, fire, El Niño, plate movement and evolution.", "file": "u3o1-kk05.html"}, {"num": "KK06", "title": "Sampling species diversity", "blurb": "Practical techniques for assessing species diversity — grids, transects and quadrats (with edge effects) and mark-recapture.", "file": "u3o1-kk06.html"}, {"num": "KK07", "title": "Simpson’s Index of Diversity", "blurb": "Measuring species diversity — species richness, endemism and applying Simpson’s Index of Diversity (SID).", "file": "u3o1-kk07.html"}, {"num": "KK08", "title": "Conservation categories", "blurb": "Ranking species by extinction risk: extinct in the wild, critically endangered, endangered, vulnerable, near threatened and least concern.", "file": "u3o1-kk08.html"}, {"num": "KK09", "title": "Assessing conservation status", "blurb": "Qualitative assessment of conservation status — changes in suitable habitat, geographic distribution and population size.", "file": "u3o1-kk09.html"}, {"num": "KK10", "title": "Threats to biodiversity", "blurb": "Human and non-human threats — habitat loss, small/isolated populations, inbreeding, lost pollinators, bioaccumulation and biomagnification, climate change, disease and introduced species.", "file": "u3o1-kk10.html"}, {"num": "KK11", "title": "Protecting populations", "blurb": "Strategies that maintain and grow populations and build resilience — protected areas, corridors, translocation, captive breeding, gene banks and targeted pesticide use.", "file": "u3o1-kk11.html"}, {"num": "KK12", "title": "Restoring ecosystems", "blurb": "Approaches to renewing and regenerating degraded ecosystems — habitat restoration, erosion control and reintroducing endemic species.", "file": "u3o1-kk12.html"}, {"num": "KK13", "title": "Treaties & legal frameworks", "blurb": "International to local instruments protecting threatened species — CITES, IUCN Red List, World Heritage areas, the EPBC Act 1999 (Cth), the FFG Act 1988 (Vic) and conservation covenants.", "file": "u3o1-kk13.html"}, {"num": "KK14", "title": "Value systems", "blurb": "Value systems that influence decision-making — anthropocentrism, biocentrism, ecocentrism and technocentrism.", "file": "u3o1-kk14.html"}, {"num": "KK15", "title": "Sustainability principles", "blurb": "The sustainability principles as they apply to biodiversity conservation — ecological integrity, resource-use efficiency, intergenerational and intragenerational equity, precautionary and user-pays principles.", "file": "u3o1-kk15.html"}]}, {"id": "u3o2", "unit": "Unit 3", "code": "U3·O2", "aos": "Area of Study 2", "name": "Sustainable Development", "accent": "#2dd4bf", "outcome": "Explain how sustainability principles relate to environmental management, analyse how stakeholder perspectives can influence environmental decision-making, and evaluate the effectiveness of environmental management strategies in a selected case study.", "assess": "School-assessed Coursework. Unit 3 SAC contributes 20% to the study score; the end-of-year examination contributes 50%. All key knowledge and key science skills underpinning the outcomes in Units 3 & 4 are examinable.", "kk": [{"num": "KK01", "title": "Case study overview", "blurb": "The aim and strategies proposed for addressing the environmen ns"],["s-recap","Recap — the seven things to remember"]],"u4o3-kk07.html":[["orient","00 Where this sits"],["bigpic","01 The big picture"],["scenario","02 The investigation we'll analyse"],["organise","03 Organising the data"],["trend","04 Finding the trend"],["relate","05 Patterns & relationships"],["outliers","06 Outliers & anomalies"],["error","07 Sources of error"],["uncertainty","08 Uncertainty"],["command","09 Command-word decoder"],["traps","10 Named exam traps"],["pel","11 P·E·L writing trainer"],["worked","12 Worked answers · weak vs strong"],["practice","13 Practice exam"],["recap","14 Recap · the analysis spine"]],"u4o3-kk08.html":[["s1","What “authentication” actually means"],["s2","The logbook as evidence"],["s3","The chain of authenticity"],["s4","The poster ↔ logbook trail"],["s5","Red flags & the reconstructed logbook"],["s6","Beyond the logbook"],["s7","Command words, decoded"],["s8","P·E·L writing lab"],["s9","Exam traps"],["s10","Practice exam · 20 marks"],["s11","One-screen cheat sheet"]],"u4o3-kk09.html":[["s-assume","Assumptions — the things you take as true"],["s-limit","Limitations — what your study could not do"],["s-three","The three sources VCAA names"],["s-sort","Assumption vs limitation vs error"],["s-improve","From limitation to improvement"],["s-write","Writing it the way examiners reward"],["s-traps","Six exam traps"],["s-exam","Practice exam · 20 marks"],["s-cheat","One-screen cheat sheet"]],"u4o3-kk10.html":[["s-why","The shared language of science"],["s-term","Precise terminology beats everyday words"],["s-rep","Choosing & labelling the right representation"],["s-sym","Symbols, formulas & subscripts"],["s-abbr","Standard abbreviations"],["s-units","Units of measurement & the SI"],["s-prefix","SI prefixes & scale"],["s-notation","Notation rules examiners notice"],["s-sigfig","Significant figures & scientific notation"],["s-cmd","Command-word decoder"],["s-traps","Seven traps that quietly cost marks"],["s-pel","P·E·L writing trainer"],["s-worked","Worked answer · weak vs strong"],["s-practice","Practice questions · 20 marks"],["s-cheat","One-screen cheat sheet"]],"u4o3-kk11.html":[["overview","What this dot point actually asks"],["bigidea","The poster is the report — not a summary of it"],["anatomy","The prescribed structure"],["builder","Build the layout yourself"],["central","The central communication statement"],["sections","What belongs in each section"],["refs","References & acknowledgements"],["succinct","Succinct communication"],["traps","Six exam traps"],["command","Command-word decoder"],["pel","P·E·L writing trainer"],["exam","Practice exam"],["cheat","Cheat sheet"]],"u4o3-kk12.html":[["s1","The \"so what?\" moment"],["s2","Result → finding → conclusion → implication"],["s3","Writing a key finding"],["s4","The implication radius"],["s5","Staying inside your evidence"],["s6","Command words"],["s7","Exam traps"],["s8","Writing trainer · P·E·L"],["s9","Weak vs strong"],["s10","Practice exam"]]},"idx":[["u3o1-kk01.html","top","The three categories of genes, species & ecosystems","U3·O1 · KK01 · Maintaining Biodiversity The three categories of genes , species & ecosystems Biodiversity isn't one thing you count — it's the variety of all life , measured at three nested levels. Get these three straight and the whole Biodiversity unit clicks into place. Drag the model below to explore how genes sit inside species, and species inside ecosystems. · Genetic — within a species Species — across species Ecosystem — across habitats 3D here, but every idea below works without it. Genetic diversity sits inside species diversity, which sits ins"],["u3o1-kk01.html","define","What is biodiversity?","02 — definition What is biodiversity? Biodiversity (biological diversity) is the variety of all living things on Earth — every organism, the genes they carry, and the ecosystems they form. The trap is to read \"variety\" as \"how many animals.\" Biodiversity is richer than a head-count: scientists describe it at three interconnected levels . 🧬 Genetic Variety of genes (alleles) within a species or population. scope: inside one species 🐾 Species Variety of different species living in an area. scope: across species 🏔️ Ecosystem Variety of ecosystems / habitats"],["u3o1-kk01.html","genetic","Genetic diversity","03 — level one Genetic diversity Definition The variety of genes (alleles) within a species or a population — the differences in heritable traits between individuals of the same species. Think of all the eastern grey kangaroos in one mob: they share a species, but differ slightly in size, colour, immune-system genes and disease resistance. That spread of alleles is the population's genetic diversity. Why it matters It's the raw material for evolution . Natural selection can only act on variation that already exists. A genetically diverse population is mo"],["u3o1-kk01.html","species","Species diversity","04 — level two Species diversity Definition The variety of different species in an area. It has two components — don't stop at the first one. # Species richness The number of different species present. \"how many kinds?\" ⚖️ Species evenness How evenly individuals are spread across those species (relative abundance). \"how balanced?\" Species diversity = richness + evenness. Two surveys can record the same number of species, yet differ in diversity because one is dominated by a single species. We'll prove this in the Richness vs evenness model — and it's the"],["u3o1-kk01.html","ecosystem","Ecosystem diversity","05 — level three Ecosystem diversity Definition The variety of ecosystems across a region — the range of different habitats, communities and the ecological processes that happen within them. An ecosystem is a community of organisms plus their physical environment, interacting as a unit. Ecosystem diversity zooms right out: how many different ecosystems does a landscape contain? High ecosystem diversity: Victoria alone spans alpine ash forests, mallee, temperate wetlands, native grasslands and rocky coasts — each a distinct ecosystem. Low ecosystem divers"],["u3o1-kk01.html","explorer","Diversity Explorer — one place, three lenses","06 — interactive Diversity Explorer — one place, three lenses Here's the same patch of Kestrel Ridge seen through each lens. Switch between the three levels and watch what \"variety\" means change. Drag to look around. Kestrel Ridge · field view loading… Pick a lens below. 3D unavailable. Genetic = one species, many slightly different individuals. Species = many different species together. Ecosystem = several distinct habitats side by side. Genetic Species Ecosystem"],["u3o1-kk01.html","evenness","Richness vs evenness — proof in 3D","07 — the classic trap Richness vs evenness — proof in 3D Two heathland plots at Kestrel Ridge, each with the same five species (same richness). The only difference is how the 50 individuals are spread. Flip Plot B between balanced and dominated and watch the diversity verdict change — richness never moves. Two plots · 5 species each · 50 individuals each richness = 5 in both Each colour is one species. Bar height = how many individuals. 3D unavailable. Plot A: 10·10·10·10·10 (even). Plot B dominated: 46·1·1·1·1. Same richness (5), but Plot A has higher e"],["u3o1-kk01.html","sorter","Classify it — which level?","08 — check yourself Classify it — which level? Drag each observation into the level it describes. (On a touch screen, tap a card then tap a bin.) Genetic diversity Species diversity Ecosystem diversity 0 / 7 placed"],["u3o1-kk01.html","web","One connected web","09 — connect it One connected web The three levels aren't separate boxes — they're nested and interdependent . Genes make up species; species make up ecosystems. So a change at one level ripples to the others: Lose genetic diversity → the species can't adapt → it weakens or dies out. Lose a species → the ecosystem loses a role (a pollinator, a predator, a food source) → the ecosystem degrades. Lose an ecosystem → habitat vanishes for many species at once → species and genetic diversity both fall. That's why protecting a single threatened endemic species "],["u3o1-kk01.html","traps","Exam traps","10 — avoid these Exam traps ⚠ Trap 1 — mixing up genetic and species Genetic diversity is variation within one species ; species diversity is variation between species . \"Within vs between\" is the line examiners look for. ⚠ Trap 2 — stopping at richness Species diversity is richness AND evenness , not just the number of species. Many lost marks come from forgetting evenness. ⚠ Trap 3 — counting organisms for \"ecosystem diversity\" Ecosystem diversity = the variety of ecosystems / habitats , not the number of animals in one place. ⚠ Trap 4 — \"biodiversity "],["u3o1-kk01.html","command","Command words — do what's asked","11 — read the verb Command words — do what's asked The verb in the question tells you how much to write. Marks are lost by describing when asked to distinguish , or listing when asked to explain . Define Give the precise meaning of the term. Short. Identify / State Name it — no explanation needed. Describe Give the features or characteristics. Distinguish Make the difference between two things explicit. Explain Say how or why — give reasons / cause and effect. Compare Give similarities and differences."],["u3o1-kk01.html","pel","Structured answers · Point → Evidence → Link","12 — structure Structured answers · Point → Evidence → Link A clean short-answer structure: make your Point , support it with Evidence / an example , then Link back to the question. Here it is on a real prompt — reveal each line to study the moves. \"Distinguish between genetic diversity and ecosystem diversity, with an example of each.\" (3 marks) Point Genetic diversity is the variety of alleles within one species, whereas ecosystem diversity is the variety of ecosystems across a region — they sit at different scales. Evidence For example, variation in d"],["u3o1-kk01.html","practice","Practice questions","13 — exam practice Practice questions Original VCE-style questions. Attempt each one first, then reveal the weak answer, the model answer, and the marking guide — and self-mark to track your score. Question 1 define 2 marks Define the term biodiversity and identify its three categories. ✗ Weak answer ✓ Model answer ▣ Marking guide ✗ Weak answer \"Biodiversity is the number of animals and plants in an area. The three types are big animals, small animals and plants.\" — defines it as a head-count, and the categories are wrong. ✓ Model answer Biodiversity is "],["u3o1-kk01.html","recap","Recap","14 — lock it in Recap The one table to memorise Category Variety of… Scope Kestrel Ridge example Genetic genes / alleles within one species disease-resistance genes varying among Helmeted Honeyeaters Species different species (richness + evenness) across species in an area 40 bird species recorded in the woodland survey Ecosystem ecosystems / habitats across a region creek wetland + grassy woodland + rocky ridge Biodiversity = the variety of all living things, at three levels. Genetic = within a species · Species = across species (richness and evenness) "],["u3o1-kk02.html","s-hero","Why genetic diversity matters when the environment changes","UNIT 3 · AOS 1 · KEY KNOWLEDGE 02 Why genetic diversity matters when the environment changes A population can only survive a new threat using alleles it already carries . Genetic diversity is that hidden reserve — and once it's gone, it's almost impossible to rebuild. scenario: Kestrel Ridge Reserve · box-ironbark woodland, central Victoria"],["u3o1-kk03.html","orient","The dot point, in VCAA's exact words","Where this sits The dot point, in VCAA's exact words ◆ Key knowledge “Ecosystems as a source of renewable services for human health and well-being: provisioning, regulating, supporting and cultural services .” Two ideas are doing the heavy lifting in that sentence. First, renewable — these services regenerate naturally as long as the ecosystem is kept functioning. Second, human health and well-being — every service is framed by how it benefits people , which is why this dot point sits so close to value systems and sustainability later in the chapter. By "],["u3o1-kk03.html","analogy","Nature’s invisible utility company","The mental model Nature’s invisible utility company Imagine a single company that quietly runs your water treatment plant, your power station, your farm, your insurance against floods, and your local park — and never sends an invoice. That’s an ecosystem. The four “departments” of that company map exactly onto the four categories of service. 🏞️ Carry this analogy through the module Four departments, one free utility Provisioning is the shop floor — physical goods you take home. Regulating is the maintenance crew — keeping the climate, water and pests in "],["u3o1-kk03.html","explorer","Explore the services flowing out of Kestrel Ridge","The four categories Explore the services flowing out of Kestrel Ridge Pick a category to light up where it happens in the reserve. The same patch of woodland and wetland is delivering all four at once — that’s the point examiners want you to grasp. provisioning 3D scene unavailable — use the cards below. Provisioning — physical goods harvested from the reserve. Provisioning The goods you can carry away Regulating Processes kept in balance Supporting The hidden foundation Cultural Non-material benefits Provisioning service Products obtained directly from "],["u3o1-kk03.html","foundation","Why supporting services hold up everything else","The exam-defining insight Why supporting services hold up everything else Supporting services — soil formation, nutrient cycling and primary production (photosynthesis) — are different from the other three. You never consume them directly, they act over very long timescales, and they are the precondition for every other service. Damage the foundation and the whole structure comes down. Press the button and watch. cause & effect 3D scene unavailable — see the explanation below. Supporting services (base) hold up provisioning, regulating and cultural. ⚠ De"],["u3o1-kk03.html","value","What if you had to pay for it?","The hook that makes it stick What if you had to pay for it? Because ecosystem services arrive free, we under-value them — until they’re gone and we have to replace them with technology. These real cases show how expensive “free” really is, and they make brilliant exam evidence. Service category Free version The replacement bill Regulating Forested watershed naturally purifies drinking water New York City protected its Catskills watershed for ~US$1.5 billion rather than build a filtration plant estimated at US$6–8 billion plus running costs. Regulating Wi"],["u3o1-kk03.html","classify","Sort the service into the right category","Practise the skill examiners test Sort the service into the right category The single most common ecosystem-services question is “classify this example.” Drag each example into a department of nature’s utility company — or tap it, then tap a bin. Get instant feedback. Provisioning drop goods here Regulating drop processes here Supporting drop foundations here Cultural drop experiences here 0 / 12 placed Tip: if you’re unsure, ask “is it a thing, a process, a foundation, or an experience?” ↺"],["u3o1-kk03.html","command","Command-word decoder","Read the question properly Command-word decoder Marks are lost when students describe a question that asked them to evaluate . Tap a command word to see exactly what it’s demanding of you in an ecosystem-services answer. ◆ Identify"],["u3o1-kk03.html","pel","The P·E·L writing trainer","Structure that scores The P·E·L writing trainer High-mark ecosystem-services answers follow a rhythm: make a Point , back it with Evidence (a named example), then Link it to human well-being or the question. Watch one well-built sentence. P · POINT State the service & category Name the specific service and which of the four categories it belongs to. Don’t be vague — “provides things” earns nothing. E · EVIDENCE Give a concrete example Anchor it in a real or case-study example. A named species, place or mechanism shows you understand, not just memorise. L"],["u3o1-kk03.html","practice","Five questions — try, then reveal model answers","Exam practice · 22 marks Five questions — try, then reveal model answers Attempt each one in your logbook first. Then reveal a weak and a strong response, the marking guide, and award yourself a mark. Your running score sits in the dock, bottom-right."],["u3o1-kk04.html","top","Reading the shape of life from the rocks","Unit 3 · AOS 1 · Maintaining Biodiversity · KK04 Reading the shape of life from the rocks Biodiversity hasn't crept upward at a steady pace. The fossil record shows life climbing, crashing, and exploding again — five catastrophic mass extinctions and several bursts of rapid diversification . This is how environmental scientists read the rate and extent of that change straight out of layered rock. diversity rising mass extinction recovery / radiation drag to orbit · 540 million years of marine family diversity VCAA dot point 3.1.2.1 Inferred from the foss"],["u3o1-kk04.html","record","The fossil record is a torn flip-book","How we know The fossil record is a torn flip-book Every claim in this dot point — that diversity rose, crashed, or exploded — comes from one source of evidence: the fossil record . Fossils form when dead organisms are buried in sediment that hardens into rock. Layer piles on layer, so the column of rock at Wirra Gorge is a stack of time. 🎞️ Analogy · the torn flip-book Imagine a flip-book animation of life on Earth. The fossil record is that book — but with most pages torn out . Soft-bodied animals (jellyfish, worms) rarely survive as fossils. Erosion sh"],["u3o1-kk04.html","rate","\"Rate\" and \"extent\" are not the same axis","The two words examiners reward \"Rate\" and \"extent\" are not the same axis The dot point asks about variation in rate and extent . Students who blur these together lose easy marks. They answer two different questions about any change in biodiversity. Rate How fast biodiversity is changing — species lost or gained per unit of time . A mass extinction is a spike in the rate of extinction. Steady, low-level loss is the background rate . Extent How much — the magnitude of the change, usually as a percentage of taxa affected. End-Permian's extent (~96% of marin"],["u3o1-kk04.html","extinct","The \"Big Five\" mass extinctions","When the rate spikes The \"Big Five\" mass extinctions Palaeontologists Raup & Sepkoski (1982) plotted marine families through time and found five moments where the extinction rate rose far above background. A mass extinction is defined as the loss of roughly ≥75% of species in a geologically short interval (typically under ~2 million years). 5 major events in 540 My ~96% peak extent (end-Permian) <2 My \"geologically short\" 10 My+ typical recovery time Tap a card to flip it. Front: when and how severe. Back: the cause and why it matters. The thread that li"],["u3o1-kk04.html","diversify","Rapid diversification fills the empty world","When the rate spikes the other way Rapid diversification fills the empty world Extinction is only half the dot point. The fossil record also shows the opposite spike: rapid species diversification (also called adaptive radiation ), where the number of species climbs steeply in a short interval. Two situations trigger it. Empty niches after a crash A mass extinction vacates ecological niches . Surviving lineages, now free of competitors and predators, radiate to fill the space. The classic case: mammals exploded in diversity after the non-avian dinosaurs "],["u3o1-kk04.html","pattern","Life's diversity: a jagged climb, not a smooth ramp","Putting the curve together Life's diversity: a jagged climb, not a smooth ramp Stand back from 540 million years and a pattern emerges. Overall biodiversity has broadly increased , but the line is punctuated — sharp crashes (the Big Five and many smaller events) and steep recoveries. The rate and extent of change are anything but constant. That variability is the dot point. ~541 Mya · Cambrian explosion Diversification spike Most major animal phyla appear rapidly — the foundational radiation of complex life. ~444 Mya · End-Ordovician Mass extinction · ~8"],["u3o1-kk04.html","classify","Extinction or diversification?","Active recall Extinction or diversification? Drag each statement (or tap it on a phone) into the bin it describes. Then check your answers. These are the two phenomena named in the dot point — drilling the distinction is exam gold. Mass extinction 0 Rapid diversification 0 s"],["u3o1-kk04.html","traps","Seven traps that cost real marks","Where marks leak away Seven traps that cost real marks ! \"The dinosaurs died at the end of the Triassic.\" No — the end-Cretaceous (K–Pg), ~66 Mya , killed the non-avian dinosaurs. The end-Triassic cleared the way for them. Mixing these up is the most common deep-time error. ! Treating \"rate\" and \"extent\" as the same thing. They're different axes — how fast vs how much . A question naming both wants both addressed. ! Saying the fossil record is complete. It's a biased, incomplete sample — soft bodies rarely fossilise, erosion destroys layers. Percentages "],["u3o1-kk04.html","command","Command-word decoder","Answer the verb that's actually asked Command-word decoder The same content earns different marks depending on the command word. Tap each to see what the examiner wants — and a worked sentence using this dot point. Identify Describe Explain Compare Analyse Evaluate"],["u3o1-kk04.html","writing","P·E·L writing trainer","Structure that scores P·E·L writing trainer Extended-response marks come from structure as much as facts. Build your answer as Point → Evidence → Link . Type a response to the prompt below; the meters light up as your writing hits each element, and detected key terms appear underneath. Prompt: Explain how a mass extinction can lead to a period of rapid species diversification, referring to evidence from the fossil record. (4 marks) Point 0% A direct claim that answers the command word Evidence 0% Named events, %, mechanisms, fossil clues Link 0% Ties evi"],["u3o1-kk04.html","practice","Practice questions — with weak & strong responses","Exam rehearsal · 17 marks Practice questions — with weak & strong responses Each question shows a weak and a strong response so you can see why marks are earned. Open the marking guide, mark your own attempt honestly, and the dock tracks your total."],["u3o1-kk05.html","bigidea","One idea, five forces","01 One idea, five forces Everything in this dot point hangs off a single sentence — learn it and you can rebuild the rest. ◆ The sentence to memorise Natural drivers change ecosystems over different time scales , and in doing so they create endemism , concentrate it into biodiversity hotspots , and drive both extinction and new diversification . The five drivers VCAA names are volcanic eruptions , fire , droughts and floods linked to El Niño , plate tectonic movement , and evolution / natural selection . Two of these are slow giants working over millions"],["u3o1-kk05.html","timescale","\"Different time scales\" — the examiner's favourite phrase","02 \"Different time scales\" — the examiner's favourite phrase Place each driver on the line. Short-term drivers reshuffle who's present; long-term drivers change what exists at all. El Niño / La Niña 2–7 yrs Fire regime years–decades Eruption + succession decades–centuries Evolution 10³–10⁷ yrs Plate tectonics 10⁷⁺ yrs ◀ short-term · ecological geological · long-term ▶ ◆ Why the distinction earns marks A short-term driver like an El Niño drought changes which species are present right now (population crashes, range shifts). A long-term driver like contine"],["u3o1-kk05.html","drivers","The five drivers, up close","03 The five drivers, up close Each card pairs the driver with a real Australian example you can quote in an answer. 🌋 Volcanic eruptions event → succession over decades–centuries Wipe an area to bare rock, then trigger primary succession — new, fertile, isolated habitat that can later host unique species. 🔥 Fire years–decades (fire regimes) s vegetation. The right fire regime maintains diversity and drives speciation; the wrong one erases it. 🌊 El Niño droughts & floods 2–7 year cycles Swings rainfall. Droughts bleach reefs and shrink populations; La Niñ"],["u3o1-kk05.html","outcomes","Three words the drivers produce","04 Three words the drivers produce Endemism, hotspots and extinction aren't separate topics — they're the outputs of the drivers above. 📍 Endemism made mostly by isolation A species found in one region and nowhere else . Driven by isolation from plate tectonics, islands and mountains. Australian examples → 🔥 Biodiversity hotspot high endemism + high threat A region with exceptional endemism that is also highly threatened . SW Australia → ⚰️ Extinction natural background + driver-spikes Loss of a species forever. Natural drivers cause it (volcanic winters"],["u3o1-kk05.html","explorer","Deep-time explorer","05 Deep-time explorer Tap a driver on the time axis. The further right, the slower it works — and the deeper its effect on what exists. ⏳ Click a driver to read its time scale & effect click a glowing marker Loading time axis… SELECT A DRIVER Tap a marker → time scale The five drivers sit on a logarithmic time axis from a few years to hundreds of millions of years. The markers nearest you act fastest. Acts over… — Pick a driver to see a quotable Australian example."],["u3o1-kk05.html","sim","Disturbance & recovery","06 Disturbance & recovery Hit the ecosystem with a natural driver and watch diversity crash — then recover through succession. Fire and eruption behave differently. That difference is the point. 📉 Run a disturbance, watch the curve live diversity readout → Growing the ecosystem… 🔥 Bushfire 🌋 Eruption ↺ Regrow Live readout Species diversity 100% Biomass / cover 100% Mature ecosystem. Hit it with a disturbance to begin. ◆ Read the curve like an examiner A bushfire in a fire-adapted system causes a sharp dip then fast recovery — seed banks, lignotubers and "],["u3o1-kk05.html","sort","Sort the drivers","07 Sort the drivers Drag (or tap) each example into the time scale it works over. Short-term reshuffles who's present; long-term changes what exists. ⚡ Short-term · ecological (years–centuries) changes which species are present now 🕰️ Long-term · geological (thousands–millions of yrs) changes which species exist at all s"],["u3o1-kk05.html","command","Decode the command word","08 Decode the command word Half of losing marks is answering the wrong verb. Tap a card to see what the examiner actually wants for this topic."],["u3o1-kk05.html","traps","Exam traps to dodge","09 Exam traps to dodge The mistakes that quietly cost marks on this dot point."],["u3o1-kk05.html","writing","Writing trainer · P·E·L","10 Writing trainer · P·E·L A reliable structure for \"explain / analyse\" answers: Point → Evidence → Link . Open each step to build a model paragraph. 4 marks Explain how plate tectonic movement has contributed to high levels of endemism in Australia. Refer to time scale."],["u3o1-kk05.html","goodbad","Good answer vs bad answer","11 Good answer vs bad answer Same question, two responses. The highlights show exactly where marks are won and lost."],["u3o1-kk05.html","practice","Practice questions","12 Practice questions Write your answer first, then reveal the model, tick off the marking points, and self-mark. Your total tracks in the score dock."],["u3o1-kk05.html","recap","60-second recap","13 60-second recap 🌏 If you remember five things Five natural drivers: volcanic eruptions, fire, El Niño droughts/floods, plate tectonics, and evolution. Different time scales: fire & ENSO act over years–decades (which species are present); plate tectonics & evolution act over millions of years (which species exist). Endemism is mainly built by isolation — and Australia's drift from Gondwana makes it a world leader in endemic species. A hotspot = high endemism + high threat (e.g. the South-West Australian Floristic Region). Drivers cause extinction and d"],["u3o1-kk06.html","hero","Sampling species diversity","Unit 3 · Outcome 1 · Maintaining Biodiversity · KK06 Sampling species diversity You can't count every honeyeater in the forest or every sedge on the swamp floor. So how do ecologists turn a handful of careful measurements into a believable number for the whole reserve? With grids, transects, quadrats and mark–recapture — and a healthy respect for the edges . Key knowledge 3.1.2.6 Key science skill: generate & record data Lincoln index provided in exam 3D · drag to orbit A 0.25 m² quadrat dropped on the swamp floor at Kestrel Ridge Reserve. green = counte"],["u3o1-kk06.html","why","You measure a slice, then reason about the whole","The big idea You measure a slice, then reason about the whole A full census — counting every individual — is only possible for big, rare, obvious things (the entire wild population of Helmeted Honeyeaters is small enough to band one by one). For everything else, ecologists take a representative sample : measure a small, fairly chosen part of the habitat, then scale up. 🍲 Think of tasting a pot of soup. You don't drink the whole pot to judge it — you stir it well (mix it so the sample is representative), then taste one spoonful . The trick is making sure "],["u3o1-kk06.html","quadrats","Quadrats — a frame of known area","Technique 1 Quadrats — a frame of known area A quadrat is a frame enclosing a known area (a classic one is 0.5 m × 0.5 m = 0.25 m² ). You place it, then inside it you can record abundance, percentage cover, or which species are present. Because the area is fixed, you can convert a count into a density and scale it up to the whole habitat. Estimated total = count in quadrat quadrat area × total habitat area Below is a patch of swamp floor divided into a sampling grid. Drop quadrats and watch the estimate of total sedge plants settle down as your sample gr"],["u3o1-kk06.html","grids","Grids & the case for randomness","Technique 2 Grids & the case for randomness A grid divides the study area into equal numbered cells. You then choose which cells to sample. How you choose is the part examiners care about: Random sampling Use a random number generator to pick grid coordinates. Removes the human urge to pick \"interesting\" spots, so the sample is unbiased and represents the whole area. Systematic sampling Sample at fixed intervals (every 5th cell, or quadrats spaced along a line). Best when you want to capture change across a gradient rather than an overall average. The bi"],["u3o1-kk06.html","transects","Transects — sampling along a gradient","Technique 3 Transects — sampling along a gradient A transect is a line laid across a habitat. You use it when species composition changes across an environmental gradient — for example, from the wet creek edge at Kestrel Ridge, up the bank, to the dry ridge top. A random scatter of quadrats would blur that change; a transect captures it in order. Line transect Record every species that touches the line at set points. Quick; good for a first picture of zonation. Belt transect Place quadrats at intervals along the line (a strip of known width). Gives abund"],["u3o1-kk06.html","edge","Edge effects — the boundary problem","The detail everyone forgets Edge effects — the boundary problem Real organisms straddle the frame. If you count every plant touching the quadrat, you over-count (you're stealing from the neighbouring area too). If you count none of them, you under-count. Without a rule, two students sampling the same quadrat get different numbers — the data isn't repeatable . The convention Count an individual only if it touches two chosen sides (say the top and the left). Ignore anything touching the other two sides. Over many quadrats the overcounts and undercounts can"],["u3o1-kk06.html","markrec","Mark–recapture & the Lincoln index","Technique 4 · for animals that move Mark–recapture & the Lincoln index You can't put a quadrat around a Helmeted Honeyeater — it flies off. For mobile animals , ecologists estimate population size by capturing, marking, releasing , letting them mix, then recapturing : Capture & mark. Catch a first sample, mark them harmlessly (leg band), record the number M , release. Mix. Wait long enough for marked birds to disperse back through the population. Recapture. Catch a second sample of total size C , and count how many carry a mark, R . N = M × C R N = estim"],["u3o1-kk06.html","choose","Which technique, and when?","Putting it together Which technique, and when? If you're sampling… Use… Because Plants / sessile organisms over a fairly uniform area Random quadrats on a grid They don't move; random placement gives an unbiased density & richness How a community changes across a gradient (wet→dry, near→far) Belt transect (quadrats along a line) Captures zonation in order; random quadrats would blur it A quick picture of zonation Line transect Fast record of what touches the line Mobile animals (birds, possums, fish) Mark–recapture (Lincoln index) Can't be quadratted; es"],["u3o1-kk06.html","worked","What a full-mark answer looks like","Good vs bad · 4 marks What a full-mark answer looks like An ecologist uses mark–recapture to estimate the number of a small fish in a reserve wetland. They mark 60 fish, release them, and three days later catch 80 fish of which 15 are marked. Estimate the population and explain one reason the true number may be higher than your estimate. (4 marks) ✕ Weak response 1 / 4 \"You do 60 times 80 which is a lot, then look at the 15 marked ones. There were about 400 fish . The number could be higher because some fish died or there were more fish than they thought"],["u3o1-kk06.html","words","Command words in this topic","Decode the question Command words in this topic The verb tells you how much to write. Tap each one. Identify / State Describe Explain Calculate Justify / Evaluate"],["u3o1-kk06.html","sort","Sort the technique","Active recall Sort the technique Drag each scenario into the sampling method you'd choose. (On touch, tap a chip then tap a bin.) Nice All sorted. If any landed in red, re-read the decision rule: rooted & random → quadrats · gradient → transect · moving → mark–recapture ."],["u3o1-kk06.html","traps","Six classic traps","Don't lose easy marks Six classic traps Saying \"throw the quadrat randomly\". Fix: that's biased. Random means random-number coordinates on a grid . Forgetting the units. Fix: density is \"per m²\", estimates are \"individuals\" — bald numbers can drop a mark. \"More accurate\" when you mean \"more reliable\". Fix: more quadrats improve reliability/precision ; accuracy is about closeness to the true value. Confusing percentage cover with density. Fix: cover = area % (for plants you can't count); density = individuals per area. Quoting the Lincoln formula without "],["u3o1-kk06.html","practice","Practice questions","Exam practice · self-mark · 18 marks Practice questions Write your answer, reveal the marking scheme, then award yourself marks honestly — the dial bottom-right tracks your total. These are written in VCAA style for the Maintaining Biodiversity outcome."],["u3o1-kk06.html","pel","Build a P·E·L answer","Writing trainer Build a P·E·L answer Sampling questions reward a tight chain: make the Point , Explain the mechanism, then Link back to the question. Try one here. Prompt — An ecologist placed all 20 quadrats along the most flower-rich strip of meadow. Explain how this affects the validity of their density estimate and how to fix it. P Point E Explain L Link Show a model sentence"],["u3o1-kk07.html","hero","Simpson's Index of Diversity","Unit 3 · Outcome 1 · Key Knowledge 07 Simpson's Index of Diversity Counting species tells you how rich a place is. But two forests with the same species list can be wildly different. Simpson's Index of Diversity captures what a headcount misses — evenness — by asking one elegant question: pick two individuals at random; how likely is it they're different species? Live · probability engine building the sample plots… Two plots, same species, same totals — watch the draws separate them. ▶ Run random draws ↺ tally Each draw grabs two individuals. Different s"],["u3o1-kk07.html","measures","01Three ways to measure species diversity","01 Three ways to measure species diversity The study design names three tools. They answer different questions, and the exam expects you to know what each one can and can't see. Species richness The total number of different species in a defined area. Count the species, ignore how many of each. Quick and intuitive. a count: e.g. \"12 species\" Endemism A species is endemic if it's found naturally nowhere else on Earth. High endemism means a place holds irreplaceable diversity — losing it is a global, not local, loss. a property: \"found only here\" Simpson's"],["u3o1-kk07.html","evenness","02Why a species count isn't enough","02 Why a species count isn't enough Drag the dominance slider. Both communities below always have the same 5 species and the same 100 individuals — only the spread changes. Richness never moves. Watch what SID does. Interactive · evenness raising the canopy… Five species · 100 individuals · richness fixed at 5 Dominance of top species even Species richness 5 never changes Simpson's Index (SID) 0.80 high diversity Top species share 20% of all individuals ⚠ The takeaway Slide all the way to one dominant species and SID collapses toward 0 — even though rich"],["u3o1-kk07.html","formula","03The formula, decoded","03 The formula, decoded VCAA gives you the formula in the exam — your job is using it without slipping. Hover or tap each part to see what it means. SID = 1 − Σ n ( n −1) N ( N −1) n the number of individuals of each species — you work out n(n−1) for every species, then add them up (that's the Σ) N the total number of individuals of all species combined — not the number of species! 1 − flips the score so that higher = more diverse , matching intuition SID a value from 0 to 1 = the probability two random individuals are different species ✗ The fraction al"],["u3o1-kk07.html","worked","04Worked example — two plots at Kestrel Ridge","04 Worked example — two plots at Kestrel Ridge A Year 12 class surveys ground-layer plants in two 4 m² quadrats at the fictional Kestrel Ridge Reserve (box-ironbark woodland, central Victoria). Both quadrats hold the same 5 species and the same 56 individuals . Use the toggle to switch sites and watch the calculation rebuild. Site A · intact gully Site B · grazed edge Site A · intact gully laying out the quadrat… Each marker = one plant, coloured by species. Click a species in the table to highlight it. Species n n − 1 n(n−1) Totals 56 — 598 Total the in"],["u3o1-kk07.html","interpret","05Reading the number","05 Reading the number A bare \"SID = 0.81\" earns little. Marks come from interpreting it in context and comparing. What the value means SID near 0 Low diversity — one or few species dominate (monoculture, degraded site) SID mid (~0.5) Moderate — some spread but uneven SID near 1 High diversity — many species, evenly abundant Why higher diversity matters A higher SID generally signals an ecosystem that is more resilient and more stable : more species and more even abundances mean redundancy in roles, so the system can absorb disturbance (disease, drought, "],["u3o1-kk07.html","classify","06Sort it out — richness, evenness, endemism or SID?","06 Sort it out — richness, evenness, endemism or SID? Drag each statement to the measure it describes. (On touch, tap a chip then tap a bin.) Richness Evenness Endemism SID s"],["u3o1-kk07.html","command","07Command-word decoder","07 Command-word decoder The verb in the question tells you exactly what to deliver. Same topic, very different answers. Calculate Compare Explain Describe Identify / State Justify / Evaluate"],["u3o1-kk07.html","traps","08Exam traps","08 Exam traps The marks lost on this dotpoint are predictable. Open each to defuse it. ! Forgetting the \"1 −\" › Students stop at D = Σn(n−1)/N(N−1) and call it the answer. That's the probability of drawing the same species — the opposite direction. Fix: always finish with SID = 1 − D. Sanity check: a clearly diverse site should give a high number. ! Using number of species for N › N is the total number of individuals , not the number of species. Putting N = 5 (the richness) instead of N = 56 wrecks the calculation. Fix: N = the sum of the whole abundance"],["u3o1-kk07.html","pel","09P·E·L writing trainer","09 P·E·L writing trainer For \"explain\" and \"compare\" answers, build each point as Point → Explain → Link . Step through a model response below. P Point E Explain L Link ‹ Back Next › Prompt: \"Compare the diversity of Site A and Site B and explain the difference.\" (3 marks)"],["u3o1-kk07.html","vs","10Good vs weak — the same question, two answers","10 Good vs weak — the same question, two answers Q: \"Sites A and B contain the same five species and the same number of individuals, yet Site A has a higher Simpson's Index of Diversity. Explain why.\" (3 marks) Weak response 1 / 3 Site A has more species so it is more diverse. It has a higher number which means it is better. Site B is worse because it has less. So A wins. Why it loses marks: the sites have equal richness, so \"more species\" is wrong and self-contradicting. \"Better/worse/wins\" isn't scientific language. No mention of evenness or what SID m"],["u3o1-kk07.html","practice","11Practice & self-mark","11 Practice & self-mark Five graded questions, 20 marks total. Attempt each on paper first, reveal the model answer, then award yourself marks — the dock tracks your total. ▸ How to self-mark honestly Award a mark only if your wording carries the same idea as a bolded mark-point — not just a near-miss. For calculations, full marks need the working and the final SID with the \"1 −\" applied."],["u3o1-kk07.html","summary","12Key takeaways","12 Key takeaways ◆ Three measures: species richness (how many species), endemism (found only here), and SID (richness + evenness in one 0–1 number). ◆ SID = 1 − Σn(n−1)/N(N−1) , where n = individuals of each species and N = total individuals. The \"1 −\" makes higher = more diverse. ◆ It's a probability: the chance two random individuals are different species. ◆ Evenness is the point: same richness can give very different SID. Dominance by one species drives SID toward 0. ◆ Interpret, don't just state: value → compare → meaning (diversity) → consequence (r"],["u3o1-kk08.html","scenario","The Kestrel Ridge brief","00 The Kestrel Ridge brief The running scenario for this chapter — one reserve, several species, very different futures. Kestrel Ridge Reserve is a box-ironbark woodland in central Victoria with a creek wetland, grassy slopes and a rocky ridge. A field team has just finished a survey season. Five of the species they logged are on the desk of the reserve manager, who has to write a single funding bid. She can't say \"they're all endangered\" — the assessor will ask how endangered, and compared with what . ★ The job of a conservation category A conservation "],["u3o1-kk08.html","ladder","One ladder, climbing toward extinction","01 One ladder, climbing toward extinction . The lower the rung, the higher the risk. Picture the categories as rungs on a ladder . The top rung is comfortable — the species is widespread and abundant. Each step down means a higher probability that the species disappears from the wild. The very bottom rung means it is already gone from the wild entirely. A species' category is just which rung it is standing on right now . The extinction-risk ladder Genetic → species → ecosystem… here: secure → lost live 3D ↻ · the Honeyeater marker sits on CR Each rung is"],["u3o1-kk08.html","cats","The six categories you must know","02 The six categories you must know VCAA wording: \"extinct in the wild; critically endangered; endangered; vulnerable; near threatened; and least concern.\" Read these from the bottom of the ladder up — worst first — because that is the order conservation effort flows. Extinct (EX) sits below the VCAA list; it is the reference point the whole scale is measured against, so it's shown here in grey. EX Extinct beyond the list No reasonable doubt the last individual has died . There is no wild and no captive population anywhere. Extinction is permanent — ther"],["u3o1-kk08.html","explorer","Status explorer — where the individuals are","03 Status explorer — where the individuals are Tap a category. Watch how many individuals survive, and whether any are left in the wild. The clearest way to feel the difference between the categories is to watch the population itself. In this scene the green plane is the wild (the species' natural range) and the glass box on the right is captivity — a zoo, sanctuary or breeding program. Each glowing dot is an individual. Step down the categories and two things change together: how many dots there are , and where they are allowed to be . Wild & ark popula"],["u3o1-kk08.html","threatened","The \"threatened\" bracket & the traps around it","04 The \"threatened\" bracket & the traps around it Where most marks are won and lost. When a report, treaty or Act says a species is \"threatened\" , it is using a precise umbrella term that covers exactly three categories: critically endangered, endangered and vulnerable . That precision matters — a species that is near threatened is, by definition, not threatened yet, even though the name sounds like it should be. ! Trap 1 — \"Near threatened\" is not threatened The \"near\" is doing a lot of work. Near threatened means a species is approaching the threatened"],["u3o1-kk08.html","dynamic","A category is a snapshot, not a sentence","05 A category is a snapshot, not a sentence Species move up and down the ladder. Toggle decline vs recovery. A conservation category is not fixed . As threats grow, a species can be uplisted to a worse rung. As conservation works, it can be downlisted to a better one. The category is a snapshot of risk right now , and re-assessment is built into the system. Trajectory along the ladder Uplisting under threat · downlisting through recovery live 3D ↻ ▼ Decline (threats grow) ▲ Recovery (conservation) ↺ The real-world round trip The European bison was hunted"],["u3o1-kk08.html","analogy","Analogies that make the ladder stick","06 Analogies that make the ladder stick 🏥 The hospital triage analogy Walk into an emergency department and everyone there needs help — but a nurse triages them. Critically endangered is the patient being rushed straight to resuscitation; endangered is the urgent-but-stable case; vulnerable is serious and admitted; near threatened is \"keep an eye on them in the waiting room\"; least concern is the person who came in, got checked, and is fine to go home. Triage doesn't mean the healthy person can never get sick — it means scarce doctors go where the risk i"],["u3o1-kk08.html","sorter","Status sorter","07 Status sorter Read each field scenario and pick the category it best matches. Instant feedback, running score. Scenario 1 of 6 — Pick the category that best fits the description above. Score 0 / 0"],["u3o1-kk08.html","command","Decoding the command word","08 Decoding the command word The verb in the question tells you the depth required. Tap a card. Identify / State 1 mk see what examiners expect → Define / Describe 1–2 mk see what examiners expect → Distinguish / Compare 2–4 mk see what examiners expect → Explain 2–4 mk see what examiners expect → Justify / Evaluate 3–6 mk see what examiners expect → Tap a command word above to reveal exactly what a marker is looking for."],["u3o1-kk08.html","pel","P·E·L writing trainer","09 P·E·L writing trainer Point · Explain · Link — the skeleton of every strong extended response. P·E·L Build the answer one move at a time A 4-mark \"explain\" question, worked the way examiners reward. Q. The Helmeted Honeyeater at Kestrel Ridge is listed as critically endangered , while a population of the same birds is kept at a breeding sanctuary. Explain what \"critically endangered\" indicates about the wild birds, and how the sanctuary population relates to the \"extinct in the wild\" category. (4 marks) P Point — answer the question directly, first ta"],["u3o1-kk08.html","practice","Practice questions","10 Practice questions VCE-style. Open each to compare a weak and a strong response, read the marking guide, then self-mark. 19 Five questions · 19 marks. Try each one in your logbook before opening the responses. Award yourself marks honestly against each guide — the radial dock bottom-right tracks your total."],["u3o1-kk08.html","recap","Recap & glossary","11 Recap & glossary ◆ The ladder Six VCAA categories rank a species by risk of extinction , from least concern (lowest risk) down to extinct in the wild (gone from the wild). ◆ \"Threatened\" = 3 Only critically endangered, endangered and vulnerable count as threatened. Near threatened and least concern do not. ◆ EX vs EW Extinct in the wild still has living individuals in captivity or naturalised — recovery is possible. Extinct means none survive anywhere. ◆ Risk, not count Categories reflect trajectory and probability , not just population size. KK09 cov"],["u3o1-kk09.html","s-hero","Assessing conservation status: reading the three warning signs","UNIT 3 · AOS 1 · KEY KNOWLEDGE 09 Assessing conservation status: reading the three warning signs A status label like endangered isn't a guess. It's a judgement built from trends in three things: how much suitable habitat remains, how far the species still ranges , and how many individuals are left . scenario: Kestrel
