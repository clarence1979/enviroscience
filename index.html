t you can't see it yet. Organising is washing out the obvious mud (tidy tables, averaged repeats). Analysing is the swirl that separates the heavy gold from the light sand — the trend rising out of the noise. Evaluating is checking your gold is real and not fool's gold: is that glint a genuine pattern, or a flake of error? Every step has a matching exam skill, and they run in this ord"],["u4o3-kk07.html","scenario","02 The investigation we'll analyse","02 The investigation we'll analyse One dataset carries the whole module, so every technique lands on the same real numbers. Priya & the Wirrim Creek stormwater study Priya, a Year 12 student, noticed Wirrim Creek runs cloudy below a stormwater outfall after rain. She designs an investigation: Question — Does turbidity (water cloudiness) change with distance downstream from the stormwater outfall? IV — distance downstream (m): 0, 25, 50 … 175 DV — turbidity (NTU) from a calibrated probe Controlled — same probe, same depth (10 cm), measured within one hour"],["u4o3-kk07.html","organise","03 Organising the data","03 Organising the data Before any graph: clean the table, average the repeats, decide your processed column. Raw → processed Three readings per site is raw data . The mean of those three is processed data — it's the value you graph. Averaging repeats is the single most important organising move: it smooths random scatter and gives you one fair number per site. Table 1 · Turbidity vs distance downstream (Priya's logbook). Site at 100 m row 2 flagged for review. Distance (m) Trial 1 (NTU) Trial 2 (NTU) Trial 3 (NTU) Mean (NTU) 0 82 88 85 85.0 25 71 69 73 7"],["u4o3-kk07.html","trend","04 Finding the trend","04 Finding the trend A graph isn't decoration — it's the analysis. The fit line is your claim about the relationship. Plot IV on the x-axis, DV on the y-axis, one point per processed value. Then add a line or curve of best fit — a single smooth line that passes through the centre of the trend , balancing points above and below. It is not a connect-the-dots zig-zag. drag to orbit Points only Join the dots Straight fit Curve of best fit error bars show anomaly 8 mean points · choose how to model the relationship Trap · join-the-dots \"Join the dots\" implies"],["u4o3-kk07.html","relate","05 Patterns & relationships","05 Patterns & relationships Naming the relationship precisely is worth marks. \"It goes down\" is not the language of an A. Direction Negative here: as distance ↑, turbidity ↓. A positive relationship rises together; no relationship shows no consistent trend. Shape Non-linear : a steep fall that flattens toward a baseline (~12 NTU). Not a straight line — the rate of change shrinks with distance. Strength Strong : points sit tightly on the curve with little scatter, so the trend is clear and the data is reliable. Trap · correlation ≠ causation Priya's graph"],["u4o3-kk07.html","outliers","06 Outliers & anomalies","06 Outliers & anomalies An anomaly is a reading that doesn't fit the pattern. Spotting it, investigating it, and justifying what you do with it is a classic mark-grabber. At 100 m, trial 2 read 95 NTU while its repeats read 36 and 34. It sits wildly above the trend — a clear anomaly . The right process is never \"delete and move on\": 1 Identify — it breaks the trend and disagrees with its own repeats. 2 Investigate — check the logbook. Priya noted a dog walker waded across upstream, stirring sediment. 3 Decide — exclude it from the mean, with a logged rea"],["u4o3-kk07.html","error","07 Sources of error","07 Sources of error Two families, two fixes. Confusing them is the most common error-question mistake. drag to orbit · the bullseye = true value Ideal Random only Systematic only Both Ideal · readings land on the true value, tightly grouped Random error Scatters readings both ways around the true value — sediment clouds drifting past, slight probe-depth differences, ripples. Affects precision (the spread). Reduce it by repeating and averaging. More repeats = smaller random error in the mean. Systematic error Shifts every reading the same way — a probe ca"],["u4o3-kk07.html","uncertainty","08 Uncertainty","08 Uncertainty No measurement is a single perfect number. Quantifying the doubt is what makes data scientific. The spread of Priya's repeats is her uncertainty. At 0 m she read 82, 88, 85 — a range of 6 NTU. A simple, VCE-acceptable estimate is ± half the range , so 85 ± 3 NTU . On a graph, that becomes an error bar — a small whisker through each point showing how far the value could reasonably swing. Why error bars matter If two points' error bars overlap , you can't confidently say they differ. If they're clearly separated , the difference is real. Err"],["u4o3-kk07.html","command","09 Command-word decoder","09 Command-word decoder The verb in the question tells you exactly how much analysis to show. Identify Name it — the pattern, the anomaly, the error type. One line, no elaboration needed. Describe State the trend with direction and shape , quoting data (\"falls from 85 to 14 NTU\"). Still no why . Analyse Break the relationship apart — direction, shape, strength, plus reading values off the line. Evaluate Judge the data's worth — anomalies, error type, uncertainty, and whether it supports the conclusion. Explain Give the mechanism — why turbidity falls (se"],["u4o3-kk07.html","traps","10 Named exam traps","10 Named exam traps Each of these has cost real students real marks. Learn them by name. Trap 1 · the bald description \"The graph goes down\" earns almost nothing. Quote values and name the shape: \"turbidity falls from 85 to 14 NTU, steeply at first then levelling off.\" Trap 2 · join-the-dots A zig-zag line through every point treats random error as real signal. Draw one smooth line/curve of best fit. Trap 3 · wrong fix for the error \"Repeat readings to reduce systematic error\" — wrong. Repeats fix random error. Systematic needs calibration. Trap 4 · dele"],["u4o3-kk07.html","pel","11 P·E·L writing trainer","11 P·E·L writing trainer Analysis answers follow Point · Evidence · Link . Type below and watch the meters respond to your keywords. Point — Evidence — Link — Point : name the relationship (negative / non-linear / strong). Evidence : quote numbers + units. Link : connect back to the hypothesis or mechanism."],["u4o3-kk07.html","worked","12 Worked answers · weak vs strong","12 Worked answers · weak vs strong Same question, two responses. The difference is precision, not length. Q. Using Table 1, describe the relationship between distance downstream and turbidity, and evaluate the reliability of the data. (4 marks) ✗ Weak response The turbidity goes down as you go further away. The results are pretty reliable because she did the experiment carefully and got good numbers. No data quoted, no shape named — just \"goes down.\" \"Did it carefully\" is not evidence of reliability; reliability is about repeats agreeing, which isn't men"],["u4o3-kk07.html","practice","13 Practice exam","13 Practice exam Five graded questions · 20 marks. Reveal the guide, mark yourself honestly, and the dock tracks your total. Q1 Multiple choice 1 mark A turbidity probe was calibrated against the wrong standard and reads 4 NTU too high at every site. This is an example of: A. Random error, fixed by taking more repeats B. Systematic error, not reduced by repeating C. An anomaly caused by a one-off disturbance D. Uncertainty, shown using error bars Q2 Describe 3 marks Describe the relationship between distance downstream and turbidity shown in Priya's data"],["u4o3-kk07.html","recap","14 Recap · the analysis spine","14 Recap · the analysis spine ◆ Organise — tidy table, units, repeats averaged to a processed mean; flag anomalies, never delete silently. ◆ Find the trend — plot it, draw one line/curve of best fit; never join the dots. ◆ Name the relationship — direction, shape, strength; quote values with units. ◆ Anomalies — identify, investigate, justify exclusion, document the raw value. ◆ Error — random (repeat & average) vs systematic (calibrate); match the fix to the type. ◆ Uncertainty — ± half-range, error bars; reliable ≠ valid; correlation ≠ causation. If yo"],["u4o3-kk08.html","s1","What “authentication” actually means","01 What “authentication” actually means Before logbooks, the word. In VCE science, authentication has a precise, examinable meaning — and it is not “proofreading” or “checking your results are right”. Authentication is the process of confirming that the primary data — and the whole investigation behind it — is genuinely the student’s own work , generated by them, using the method they describe, over the time they claim. It establishes two things at once: authorship (this is mine) and provenance (this is where it came from and how). VCAA’s authentication "],["u4o3-kk08.html","s2","The logbook as evidence","02 The logbook as evidence A logbook is a contemporaneous, dated, sequential record of the entire investigation. These are the features that turn a notebook into proof. 📅 Dated & timed Every entry carries a date (and ideally a time), written as the work happens . Dates prove the investigation unfolded over real time — not in one panicked sitting. ⚡ Contemporaneous Recorded at the moment of generation, in the field or lab — not copied up neatly afterwards. The original record, smudges and all. 🔢 Raw primary data The actual readings as they came off the in"],["u4o3-kk08.html","s3","The chain of authenticity","03 The chain of authenticity Think of authentication like a forensic chain of custody . In court, physical evidence is only admissible if there’s an unbroken, documented trail showing who handled it and when. Break the chain — one undocumented gap — and the evidence is thrown out. Your logbook is exactly that chain for your data. Each dated entry is a link . Together they form a continuous trail: aim → hypothesis → method → raw data → analysis → conclusion , all in sequence, all sighted. Authentication depends on that continuity. The scene below lets you"],["u4o3-kk08.html","s4","The poster ↔ logbook trail","04 The poster ↔ logbook trail Authentication isn’t passive — it’s an active cross-check. A teacher reads the poster, then opens the logbook and asks of every figure: “where did this come from?” Your poster is a bank statement — a tidy summary of totals. Your logbook is the drawer of itemised receipts . Every number on the statement must match a receipt; a charge with no receipt is exactly the kind of thing that gets questioned. In the scene below, a glowing thread traces a poster bar back to its raw source. Toggle a figure that has no logbook origin and "],["u4o3-kk08.html","s5","Red flags & the reconstructed logbook","05 Red flags & the reconstructed logbook The fastest way to understand authentication is to watch it fail . Meet Priya’s classmate. cautionary tale Dylan’s night-before logbook Dylan did do some of the fieldwork — but he never kept a logbook as he went. The night before submission he “wrote up” a logbook from memory and a few phone photos: every entry in the same pen, no dates, the data already averaged, no anomalies, no teacher sightings, and two poster figures that appear nowhere in the notes. It looks like a logbook. It authenticates almost nothing. ▲"],["u4o3-kk08.html","s6","Beyond the logbook","06 Beyond the logbook The logbook is central, but it doesn’t work alone. Schools use a layered set of authentication strategies — useful to name in a high-mark answer. In-class generation of data. When primary data is produced under teacher supervision, authorship is witnessed directly. Teacher observation & checkpoint sightings. Regular initialled sightings of the logbook and drafts confirm steady, genuine progress. Signed authentication declaration. Students declare the submitted work is their own; schools keep the record. Questioning / viva. A student"],["u4o3-kk08.html","s7","Command words, decoded","07 Command words, decoded Authentication questions reward precision. Tap a command word to see exactly what it’s asking for here. Outline 1–2 Give the main features briefly, no detail needed. “Outline how a logbook authenticates data” → name dated, contemporaneous, sequential recording — a sentence or two. Describe 2–3 Give a fuller picture of features/characteristics. “Describe two features of a logbook that support authentication” → name and say what each does. Explain 3–4 Say how/why it works — show the mechanism. “Explain how a logbook authenticates "],["u4o3-kk08.html","s8","P·E·L writing lab","08 P·E·L writing lab Structure beats waffle. Build a 3-mark answer with Point · Example · Link , and watch the keyword meters fill as you hit the language examiners reward. Practice question: Explain how the use of a logbook authenticates the primary data generated during a student’s scientific investigation. (3 marks) P · Point State the mechanism in one clean sentence. Aim for: dated, contemporaneous, sequential record → student’s own work. keywords: — E · Example Ground it. Use a concrete logbook feature — a dated raw reading, a recorded anomaly, a te"],["u4o3-kk08.html","s9","Exam traps","09 Exam traps Six ways students throw away authentication marks. Bold green is the fix. T1 Confusing authentication with accuracy or validity “The logbook makes the data accurate.” No. Authentication is about ownership and origin , not correctness or sound design. Keep the three ideas separate: authentication = whose & from where; accuracy = how close to true; validity = measures what it intends. T2 Describing the logbook’s planning role instead The logbook also helps plan and record — but the question asks about authentication . Anchor every sentence to"],["u4o3-kk08.html","s10","Practice exam · 20 marks","10 Practice exam · 20 marks Five VCAA-style questions. Attempt each, reveal the weak vs strong responses and the marking guide, then self-mark — your score fills the dock in the corner. Q1 Multiple choice 1 mark In a student scientific investigation, the primary purpose of the logbook in authentication is to: A improve the accuracy of the measurements taken in the field. B ensure the method is valid and measures the intended variable. C provide a dated, contemporaneous record confirming the data is the student’s own work. D present the final results clea"],["u4o3-kk08.html","s11","One-screen cheat sheet","11 One-screen cheat sheet The whole dot point, ready for the night before. ◆ Definition Authentication = confirming the data & investigation are the student’s own work , generated as claimed. About authorship + provenance — not accuracy, not validity. ✓ What authenticates Dated & timed entries Contemporaneous (recorded as it happens) Sequential / chronological Raw primary data, not just averages Teacher sightings (independent witness) Visible mistakes & anomalies ▲ Red flags No dates / back-dating One pen, one sitting Averaged-only, no raw data Too perfe"],["u4o3-kk09.html","s-assume","Assumptions — the things you take as true","01 Assumptions — the things you take as true A premise your method or conclusion quietly depends on. An assumption is a condition you accept as true without directly proving it , so that your investigation makes sense and your conclusion holds. Assumptions are usually unstated — which is exactly why examiners reward students who can drag them into the light. ◆ Analogy · the foundations you never see A conclusion is a house. Assumptions are the foundations underneath it — invisible once the house is built, but the house only stands if they hold. If a key "],["u4o3-kk09.html","s-limit","Limitations — what your study could not do","02 Limitations — what your study could not do A factor that restricts the investigation, or narrows the conclusion you can fairly draw. A limitation is a feature of your design, equipment or scope that restricts how confidently or how widely you can conclude . Crucially, a limitation is built in — it would still be there even if you ran the whole thing perfectly, with no slips. ◆ Analogy · the size of your window A limitation is the size of the window you're looking through . Dev studied one roof, one tree, one fortnight — a small window. Whatever Dev se"],["u4o3-kk09.html","s-three","The three sources VCAA names","03 The three sources VCAA names The dot point lists them explicitly: methodology · data generation · analysis . The wording of KK09 is a gift — it tells you exactly where to go looking. Strong students walk through all three categories like a checklist, which is also how the marks are usually split. Methodology & method How the study was designed and run . Small sample / few replicates Narrow range of the independent variable Short time frame; single site or season A confounding variable you couldn't control No genuine control group Data generation How t"],["u4o3-kk09.html","s-sort","Assumption vs limitation vs error","04 Assumption vs limitation vs error The distinction examiners say students get wrong most often. Three quick tests will place almost any statement: Assumption — is it a premise you're taking as true for the study to work? \"We assume X is true.\" Limitation — would it still be there if you ran the study flawlessly? Then it's built into the design or scope. \"The study can't…\" Personal error / mistake — is it an avoidable slip a careful person could've prevented? Then it's an error, not a limitation. \"I accidentally…\" Sort the statements drag · or tap-then-"],["u4o3-kk09.html","s-improve","From limitation to improvement","05 From limitation to improvement A limitation is only half a mark; the improvement that fixes it is the other half. The poster's discussion — and most exam \"evaluate\" questions — want a limitation paired with a realistic improvement that actually addresses it . The trap is offering \"be more careful,\" which fixes error , not the limitation. A real improvement changes the design, equipment or scope . Match the fix pair Tap a limitation on the left, then tap the improvement that genuinely addresses it on the right. Limitation Improvement that fixes it 0 / "],["u4o3-kk09.html","s-write","Writing it the way examiners reward","06 Writing it the way examiners reward Decode the command word, then build with P·E·L. First, read the verb. The same scenario earns very different things depending on the command word: Identify / State Describe Explain Evaluate Justify / Suggest Build the answer with P·E·L For a limitations response, Point (name it + its category), Example (the specific detail from the study), Link (what it does to the conclusion + the fix). Type below and the meters track whether you've hit each move. P·E·L writing trainer live feedback Prompt: A student measures strea"],["u4o3-kk09.html","s-traps","Six exam traps","!! Six exam traps Where U·O3 marks quietly leak away. ⚠ Trap 1 · calling a mistake a limitation \"I read the scale wrong\" / \"I forgot to start the timer\" are personal errors . They're avoidable and don't belong in a limitations answer. A limitation survives a perfectly-run study. ⚠ Trap 2 · \"human error\" as a catch-all Writing \"human error\" earns nothing — it's vague and usually means a mistake anyway. Name a specific, structural limitation instead. ⚠ Trap 3 · a limitation with no consequence \"Small sample size\" on its own is a list item, not an answer. S"],["u4o3-kk09.html","s-exam","Practice exam · 20 marks","EX Practice exam · 20 marks VCAA-style. Reveal weak / strong / marking guide, then self-mark. Your score tracks in the dock. Q1 1 mark Multiple choice A student investigating earthworm density assumes that \"the soil moisture was the same across all five plots.\" This statement is best classified as: A. a personal error B. an assumption C. a methodology limitation D. a random error Weak answer Strong answer Marking guide C — methodology limitation. Why it drops the mark: it confuses a stated premise taken as true with a constraint on the design. The studen"],["u4o3-kk09.html","s-cheat","One-screen cheat sheet","TL One-screen cheat sheet Everything KK09, compressed for the night before. // definitions Assumption — premise taken as true; the conclusion depends on it. Limitation — built-in constraint; restricts the conclusion. Error — avoidable slip; not a limitation. // three sources Methodology — sample size, range, time, site, confounders, no control. Data generation — resolution, subjectivity, too few repeats. Analysis — correlation ≠ cause, no extrapolation, small n. // the three tests \"We assume X.\" → assumption Survives a perfect run? → limitation A careful"],["u4o3-kk10.html","s-why","The shared language of science","01 The shared language of science A scientific investigation is only finished when someone else can read it, trust it, and repeat it. Conventions of science communication are the agreed rules that let any scientist — in Mildura or Munich — read your poster and understand it exactly the same way. Get them right and your meaning travels cleanly. Get them wrong and a brilliant investigation can read as careless. CO₂ mg/L W·m⁻² µS/cm Drag to orbit · the same conventions every scientist agrees to use 3D not available — the orbiting tokens are decorative; ever"],["u4o3-kk10.html","s-term","Precise terminology beats everyday words","02 Precise terminology beats everyday words Everyday language is vague on purpose — it leaves room for interpretation. Science wants the opposite: one precise term that names exactly what you mean. Swapping casual phrasing for the correct technical term is the quickest mark-saver on a poster. Translator · everyday → scientific tap a phrase Tap Priya's casual phrases to reveal the precise term an examiner rewards. Pick a phrase above Each casual phrase maps to a specific, testable scientific term. Analogy · ordering coffee “A coffee, thanks” gets you anyt"],["u4o3-kk10.html","s-rep","Choosing & labelling the right representation","03 Choosing & labelling the right representation A representation is any non-prose way of showing information — a table, graph, flowchart, food web or labelled diagram. The convention has two halves: pick the form that fits the data , then label it so it stands alone . Representation matcher pick the best form For each of Priya's data situations, choose the representation a marker would expect. Score: 0 / 5 correct Line graph Continuous independent variable (distance, time, temperature). Plot IV on the x-axis , DV on the y-axis . Use a line of best fit, "],["u4o3-kk10.html","s-sym","Symbols, formulas & subscripts","04 Symbols, formulas & subscripts Chemical symbols and formulas are international shorthand. The subscript tells you how many atoms of the element before it — and the case of every letter carries meaning. CO (carbon monoxide) is not CO₂ (carbon dioxide) and neither is Co (cobalt). Formula Reads as Where it appears in EnviroSci CO₂ 1 carbon, 2 oxygen Enhanced greenhouse effect; respiration; combustion CH₄ 1 carbon, 4 hydrogen Methane — high warming potential N₂O 2 nitrogen, 1 oxygen Nitrous oxide — agriculture, fertilisers O₂ / O₃ oxygen gas / ozone Disso"],["u4o3-kk10.html","s-abbr","Standard abbreviations","05 Standard abbreviations An abbreviation only works if it is standard and defined on first use . Write the term in full the first time with the abbreviation in brackets — “dissolved oxygen (DO)” — then use DO thereafter. Inventing your own (“H2Oxy”) defeats the purpose. Tap each card to flip and reveal what the abbreviation stands for. Exam habit If you use an abbreviation in a short-answer response, define it once. Markers will not assume EC means electrical conductivity rather than, say, the European Commission. One bracketed definition protects every"],["u4o3-kk10.html","s-units","Units of measurement & the SI","06 Units of measurement & the SI The International System of Units (SI) is the global standard. A handful of base units are defined first; everything else is a derived unit built by multiplying or dividing them. Reporting in SI is what makes your number comparable to anyone else's. Base quantity SI base unit length metre (m) mass kilogram (kg) time second (s) temperature kelvin (K) amount of substance mole (mol) Derived quantity Built from area m² = m × m volume m³ , or litre (L) concentration mg/L = mass ÷ volume density kg/m³ = mass ÷ volume radiative "],["u4o3-kk10.html","s-prefix","SI prefixes & scale","07 SI prefixes & scale Environmental data spans enormous ranges — micrograms of a pollutant up to gigatonnes of carbon. Prefixes rescale a unit by powers of ten so the number stays readable. The quantity never changes — only how you write it. Prefix ladder step the scale 3D not available — the ladder controls and live readout below work on their own. ▼ smaller prefix ▲ larger prefix — A fixed mass of carbon, written with different prefixes — same quantity, different size of number. Prefix Symbol Factor Example in EnviroSci giga G 10⁹ Gt CO₂ — global emis"],["u4o3-kk10.html","s-notation","Notation rules examiners notice","08 Notation rules examiners notice A few small typographic rules separate a polished poster from a rushed one. They feel fussy — but each one removes a possible misreading. Space the unit One space between the number and the unit: 25 °C , 8.2 mg/L — not 25°C or 8.2mg/L . (Exceptions: % and pH carry no spaced unit.) Don't pluralise symbols 5 kg , never 5 kgs . Unit symbols are invariant — they never take an “s” and never take a full stop ( kg , not kg. ). Case is not optional kg , L , K . Units named after a person take a capital symbol but lowercase name"],["u4o3-kk10.html","s-sigfig","Significant figures & scientific notation","09 Significant figures & scientific notation Your numbers must be honest about precision . Significant figures show how finely you actually measured; scientific notation keeps very large or very small numbers compact and unambiguous. Counting significant figures Non-zero digits always count. Zeros between them count. Leading zeros never count (0.0048 → 2 s.f.). Trailing zeros count only with a decimal point (8.20 → 3 s.f.). Reporting a result A calculated answer can be no more precise than your least precise measurement. If your probe reads to 2 s.f., do"],["u4o3-kk10.html","s-cmd","Command-word decoder","10 Command-word decoder Convention questions often hinge on the verb. Convert wants working and a unit; justify wants a reason. Match your answer's shape to the command word. Tap a command word to see what the examiner expects."],["u4o3-kk10.html","s-pel","P·E·L writing trainer","12 P·E·L writing trainer Structure a convention answer as Point · Example · Link : name the convention, show it applied (often a corrected version), then link to why it matters for communication. Type below — the meters react to what you write. Practice prompt On her poster Priya writes: “temp was 25°C and DO was 8mg/l” . Identify two conventions she has breached and rewrite the phrase correctly , explaining why each correction aids communication. (4 marks) Point Name the actual convention Example Show the corrected form Link Why it helps the reader Reve"],["u4o3-kk10.html","s-worked","Worked answer · weak vs strong","13 Worked answer · weak vs strong Same question, two responses. The difference is entirely in convention discipline. Question (3 marks) Priya measured dissolved oxygen at six distances downstream. Identify the most appropriate graph type and justify your choice, referring to the variables. State how the axes should be labelled. ✕ Weak response “A bar graph because it shows the oxygen at each spot. Put distance and oxygen on it.” Wrong form (distance is continuous, not categorical), no link to variable type, and axis labelling has no quantities or units. "],["u4o3-kk10.html","s-practice","Practice questions · 20 marks","14 Practice questions · 20 marks VCAA-style. Attempt each in your logbook first, then reveal the weak answer, strong answer and marking guide. Mark yourself honestly — the dial tracks your total. 0 / 20 score: 0 / 20 Reveal each model answer, then tap the marks you'd award yourself."],["u4o3-kk10.html","s-cheat","One-screen cheat sheet","15 One-screen cheat sheet Convention quick-reference Terminology — one precise technical term, never casual phrasing. Representation — line (continuous IV) · bar (categories) · scatter (relationship) · flowchart (process) · food web (feeding). Title + axes with units + legend. Symbols / formulas — case & subscript carry meaning: CO₂ ≠ CO ≠ Co . Define every symbol in a formula. Abbreviations — define in full on first use: dissolved oxygen (DO). SI units — base (m, kg, s, K, mol); derived built from them (mg/L, W/m²). Prefixes — G 10⁹ · M 10⁶ · k 10³ · m "],["u4o3-kk11.html","hero","Scientific poster conventions","U·O3 · KK11 Scientific poster conventions Months of fieldwork have to land on one A3 page . This is how you make a reader understand your whole investigation in 60 seconds. VCAA key knowledge · conventions of scientific poster presentation — succinct communication, with acknowledgements & references"],["u4o3-kk11.html","overview","What this dot point actually asks","brief What this dot point actually asks After you design and run your Outcome 3 investigation, you don't write a 2,000-word report. You distil it into a scientific poster — a single A3 page that a stranger can read standing up, in a couple of minutes, and walk away knowing your aim, what you found, and whether you trust it. That distillation is the skill being assessed. The poster has a prescribed structure set by VCAA, a distinctive central one-sentence summary , a tight word budget , and strict rules about referencing and acknowledgements . Examiners l"],["u4o3-kk11.html","bigidea","The poster is the report — not a summary of it","01 · the big idea The poster is the report — not a summary of it A common misconception: students treat the poster as a \"shrunk-down lab report\" and try to cram every paragraph onto the page in 8-point font. That fails. The poster is a different genre , built for a different reader. Analogy — the gallery wall, not the textbook. A textbook chapter is read seated, front to back. A poster is read like a painting on a gallery wall: the viewer glances, the eye is pulled to the title , then the central finding , then dives into whichever column interests them."],["u4o3-kk11.html","anatomy","The prescribed structure","02 · anatomy The prescribed structure VCAA prescribes the sections a VCE science poster must contain. Different schools tweak the visual layout, but every poster carries this set of components, in this logical order: Component What it carries Sloane's poster Title The investigation, phrased as a question or topic — informative, not cute \"Effect of fixed panel tilt angle on daily solar energy yield at Yarrabin\" Student name Author identification (with school where required) S. Tran, Year 12 Introduction Background/context, the aim/question , and the hypot"],["u4o3-kk11.html","builder","Build the layout yourself","03 · do it Build the layout yourself Drag each component chip into the zone where it belongs on the A3 page. If a reader's eye should hit it early, it goes high or centre. Get the spatial logic into your hands — it's worth easy marks. layout_builder 0 / 8 placed TOP BANNER UPPER LEFT COL ▲ ★ CENTRE RIGHT COL ▲ LEFT COL ▼ RIGHT COL ▼ BOTTOM STRIP Title + name Introduction Methodology & method One-sentence finding Results (graphs) Discussion Conclusion References & thanks Check layout On touch screens, tap a chip then tap its zone. ✓ Why this order works T"],["u4o3-kk11.html","central","The central communication statement","04 · the centrepiece The central communication statement This single sentence is the most VCAA-specific convention on the poster, and the one students botch most. It must: be one sentence (or one short continuous statement) — not a paragraph; state the key finding , ideally with direction and magnitude ; sit in the centre of the poster, readable on its own; be understandable without reading anything else on the page. ✕ Trap — restating the aim \"This investigation explored how tilt angle affects solar yield.\" That's the aim , not a finding. The central st"],["u4o3-kk11.html","sections","What belongs in each section","05 · the sections What belongs in each section Each section has a job. Knowing the job — and the classic mistake — is how you avoid losing marks for misplacing content. Introduction Job: set context, state the aim/question and the hypothesis (with reasoning). Trap: dumping results here, or a hypothesis with no \"because\". Methodology & method Job: name the methodology (e.g. controlled experiment) + a summary method another student could repeat. Trap: a 12-step recipe. It's a poster, not a protocol. Results Job: processed data — graphs/tables with captions"],["u4o3-kk11.html","refs","References & acknowledgements","06 · integrity References & acknowledgements These two are required components , and they're about academic integrity — giving credit and being honest about help. They're different things: 📑 References Cite every source of secondary information or ideas — the latitude value you looked up, a textbook definition, a dataset. Use a consistent style (e.g. author–date). This is about credit and verifiability . 🤝 Acknowledgements Thank the people and resources that helped — a teacher who lent the pyranometer, a peer who helped log readings, the lab that calibra"],["u4o3-kk11.html","succinct","Succinct communication","07 · craft Succinct communication \"Succinct\" is in the VCAA wording for a reason. A poster is bounded by space (~one A3 page) and a word budget (around 600 words is the usual guide) . Every word competes for room with a figure that could say it better. The word budget is a forcing function. Think of it like a suitcase with a weight limit. You can't take everything, so you pack the essentials and leave the bulky prose at home. A graph weighs almost nothing and carries a whole trend — so trade text for figures wherever you can. 📊 Figures over text One capt"],["u4o3-kk11.html","traps","Six exam traps","08 · pitfalls Six exam traps 1 \"Just shrink the report\" Cramming full prose onto A3 isn't a poster. Examiners want a redesigned, visual artefact — not a miniature essay. 2 Missing the central statement No one-sentence finding in the centre = you've missed the defining VCAA convention. Always include it. 3 Central statement = the aim \"This studied tilt and yield\" is the question. The centre needs the answer , with direction and magnitude. 4 Raw data in Results Results carry processed data (graphs/means), not the raw logbook table. Raw data lives in the lo"],["u4o3-kk11.html","command","Command-word decoder","09 · decode the question Command-word decoder Poster questions reuse the same verbs. Match the verb to the move the examiner wants. command_decoder Identify / State Describe Explain Outline Justify Evaluate"],["u4o3-kk11.html","pel","P·E·L writing trainer","10 · write like an examiner marks P·E·L writing trainer Strong responses make a P oint, give E vidence (a convention, a number, a named section), and L ink back to the question. Draft an answer to the prompt below and watch the meters light up as your writing earns each move. ✎ Prompt Explain why a scientific poster includes a one-sentence statement in its centre, and one consequence of leaving it out. pel_trainer live keyword meters 0 Point claim made 0 Evidence terms used 0 Link back to Q 0 Words aim 40–80 Start typing…"],["u4o3-kk11.html","exam","Practice exam","11 · practice Practice exam Five VCAA-style questions, 20 marks total. Try each on paper first, then reveal the weak answer, the strong answer and the marking guide. Mark yourself honestly — the dock bottom-right tracks your total. Q1 Multiple choice 1 mark Which feature is unique to the VCE scientific poster format (compared with a standard lab report)? A. A methods section B. A graph of results C. A one-sentence finding in the centre D. A reference list Show weak Show strong Marking guide ✕ Weak \"D — the reference list.\" Lab reports also have reference"],["u4o3-kk11.html","cheat","Cheat sheet","12 · one-screen recap Cheat sheet // the format One A3 page · ~600 words max · succinct, visual, designed to be read standing up in <2 min. // required sections Title · name · introduction (aim + hypothesis) · methodology & method · results · discussion · conclusion · references & acknowledgements. // the centrepiece A one-sentence finding in the centre — the signature VCAA convention. Direction + magnitude. It's a headline, not the aim. // results vs discussion Results = what (processed graphs/tables, captioned). Discussion = why + evaluation of error/u"],["u4o3-kk12.html","s1","The \"so what?\" moment","SECTION 01 The \"so what?\" moment An investigation that stops at a graph is only half-finished. The marks live in two sentences: what you found , and why it matters . Imagine you spend a weekend baking, taste-testing and recording which oven shelf browns a cake most evenly. If a friend asks \"how did it go?\" and you just hand them a spreadsheet of temperatures, they'll stare at you. What they want is the finding (\"the middle shelf browns most evenly\") and the implication (\"so put cakes on the middle shelf — and it probably applies to biscuits too\"). Scienc"],["u4o3-kk12.html","s2","Result → finding → conclusion → implication","SECTION 02 Result → finding → conclusion → implication These four words are not synonyms, and examiners deliberately test whether you can tell them apart. Think of them as a relay — each one passes the baton a step further from the raw numbers. Term What it is Priya's creek, worked Result A raw, specific number or observation straight from your data — no interpretation. \"Mean turbidity at 0 m was 41 NTU; at 175 m it was 12 NTU.\" Finding The pattern or relationship the results show , in plain interpreted language. \"Turbidity decreased steadily with distan"],["u4o3-kk12.html","s3","Writing a key finding","SECTION 03 Writing a key finding A key finding is the headline relationship your investigation uncovered. A strong one does three things at once: Names the relationship between your independent and dependent variables (what changed with what). Uses the direction word — increased, decreased, was higher/lower, showed no difference. Anchors it in quantified evidence — a value, a range, or a comparison from your own data. Finding formula As [independent variable] [changed], [dependent variable] [direction] (from X to Y), indicating [relationship]. e.g. \"As d"],["u4o3-kk12.html","s4","The implication radius","SECTION 04 The implication radius Implications spread outward from a finding like ripples. The trick is to recognise the different directions meaning can travel — examiners reward breadth here. Explore the five domains below. click a domain · explore the implications SELECT A DOMAIN Click a glowing node to see how Priya's single finding ripples into that area of meaning. Direction Question it answers Priya's creek Environmental What does this mean for the ecosystem itself? High turbidity reduces light, harming aquatic plants and sediment-sensitive macroi"],["u4o3-kk12.html","s5","Staying inside your evidence","SECTION 05 Staying inside your evidence The most common way to lose implication marks is to over-reach — to claim more than your data can support. A finding from one creek, on one day cannot prove a fact about every waterway on Earth . The skill is matching the scope of your claim to the scope of your evidence . Scope-o-meter · how far can this claim travel? Drag the slider to widen Priya's claim. Watch where the evidence stops supporting it. Three over-reach phrases examiners pounce on \"This proves …\" — a single student investigation supports or is cons"],["u4o3-kk12.html","s6","Command words","SECTION 06 Command words The verb in the question controls how much \"so what?\" you owe. Tap each to reveal what it demands."],["u4o3-kk12.html","s7","Exam traps","SECTION 07 Exam traps The recurring ways students leak marks on findings-and-implications questions:"],["u4o3-kk12.html","s8","Writing trainer · P·E·L","SECTION 08 Writing trainer · P·E·L Strong implication answers follow P·E·L — P oint (state the implication), E vidence (cite your own data), L ink (connect to management, theory or the wider world). Draft a response below; the meters light up as you hit each move. Prompt · \"State one key finding from Priya's study and discuss one implication of it. (4 marks)\" P · Point 0% State the finding clearly. E · Evidence 0% Quote a value or comparison. L · Link 0% Reach outward — so what?"],["u4o3-kk12.html","s9","Weak vs strong","SECTION 09 Weak vs strong Same prompt — \"State one key finding and one implication of Priya's investigation (4 marks)\" — answered two ways. Read the annotations. ✗ WEAK — 1 / 4 \"Priya found that the turbidity was high. This proves that all stormwater drains pollute every river , so the council should ban all drains .\" No number or relationship — \"high\" is not a finding, it's vague. \"Proves… all rivers\" massively over-reaches one creek on one day. The implication (\"ban all drains\") is not justified by the evidence and isn't realistic management. ✓ STRONG "],["u4o3-kk12.html","s10","Practice exam","SECTION 10 Practice exam Five graded questions, 20 marks total. Attempt each, reveal the marking scheme, then self-mark — your score collects in the dock."]],"titles":{"u3o1-kk01.html":"The three categories of genes, species & ecosystems","u3o1-kk02.html":"Why genetic diversity matters when the environment changes","u3o1-kk03.html":"The dividends nature pays:ecosystem services","u3o1-kk04.html":"Reading the shape of life from the rocks","u3o1-kk05.html":"Nobody planted the bush.The planet did.","u3o1-kk06.html":"Sampling species diversity","u3o1-kk07.html":"Simpson's Index of Diversity","u3o1-kk08.html":"Ranking a species by its risk of ex const isBuilt = f => BUILT.includes(f);

/* flatten module lookup */
const MODS = {};
DATA.foundations.forEach(m => MODS[m.file] = {kind:"foundation", ...m});
DATA.chapters.forEach(ch => ch.kk.forEach(k => MODS[k.file] = {kind:"kk", chapter:ch, ...k}));

function hexA(hex,a){const n=parseInt(hex.slice(1),16);return `rgba(${n>>16&255},${n>>8&255},${n&255},${a})`;}
function modLabel(file){const m=MODS[file];if(!m)return file;return m.kind==="kk"?`${m.num} ${m.title}`:m.title;}
function modCode(file){const m=MODS[file];if(!m)return "";return m.kind==="kk"?`${m.chapter.code} · ${m.num}`:"Foundations";}
function modAccent(file){const m=MODS[file];return m&&m.kind==="kk"?m.chapter.accent:"#9d9d9d";}
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function cssEsc(file){return (window.CSS&&CSS.escape)?CSS.escape(file):file.replace(/["\\]/g,'\\$&');}

let openTabs = [];          // {key,label,accent}
let activeKey = "welcome";
let currentModuleFile = null;  // file open in viewer (for subtopics)

/* ===================== TREE ===================== */
function buildTree(){
  const t = document.getElementById("tree");
  let html = "";
  html += `<div class="grp open" data-grp="found">
    <div class="grp-head"><span class="chev">▶</span><span class="dot" style="background:var(--fg-faint)"></span><span class="gname">Foundations</span></div>
    <div class="kids">`;
  DATA.foundations.forEach(m=>{
    html += `<div class="leaf ${isBuilt(m.file)?'is-built':''}" data-file="${m.file}">
      <svg class="fileicon" viewBox="0 0 16 16" fill="currentColor"><path d="M9 1H3.5L3 1.5v13l.5.5h9l.5-.5V5L9 1zm0 1.4L11.6 5H9V2.4zM4 14V2h4v3.5l.5.5H12v8H4z"/></svg>
      <span class="knum">·</span><span class="kt">${esc(m.title)}</span><span class="built"></span></div>`;
  });
  html += `</div></div>`;

  let lastUnit="";
  DATA.chapters.forEach(ch=>{
    if(ch.unit!==lastUnit){ html += `<div class="unit-label">${ch.unit}</div>`; lastUnit=ch.unit; }
    html += `<div class="grp" data-grp="${ch.id}" style="--caccent:${ch.accent}">
      <div class="grp-head" data-chapter="${ch.id}">
        <span class="chev">▶</span><span class="dot" style="background:${ch.accent}"></span>
        <span class="gname">${esc(ch.name)}</span><span class="gcode">${ch.code}</span></div>
      <div class="kids">`;
    ch.kk.forEach(k=>{
      const sx=(k.num+" "+k.title+" "+k.blurb).toLowerCase().replace(/"/g,'');
      html += `<div class="leaf ${isBuilt(k.file)?'is-built':''}" data-file="${k.file}" data-search="${esc(sx)}" style="--accent:${ch.accent};--accent-soft:${hexA(ch.accent,.14)}">
        <span class="knum">${k.num}</span><span class="kt">${esc(k.title)}</span><span class="built"></span></div>
      <div class="subnav" data-subnav="${k.file}"></div>`;
    });
    html += `</div></div>`;
  });
  t.innerHTML = html;

  t.querySelectorAll(".grp-head").forEach(h=>{
    h.addEventListener("click",()=>{
      const grp = h.closest(".grp");
      const ch = h.dataset.chapter;
      grp.classList.toggle("open");
      if(ch){ openChapter(ch); }
    });
  });
  t.querySelectorAll(".leaf").forEach(l=>{
    l.addEventListener("click",()=>openModule(l.dataset.file));
  });

  document.getElementById("stCount").textContent =
    `${Object.keys(MODS).length-DATA.foundations.length} key-knowledge modules`;
}

/* ===================== TABS ===================== */
function renderTabs(){
  const tb=document.getElementById("tabbar");
  let html = tab("welcome","Welcome","",false);
  openTabs.forEach(t=> html+=tab(t.key,t.label,t.accent,true));
  tb.innerHTML=html;
  tb.querySelectorAll(".etab").forEach(el=>{
    el.addEventListener("click",e=>{
      if(e.target.classList.contains("x")) return;
      activate(el.dataset.key);
    });
    const x=el.querySelector(".x");
    if(x) x.addEventListener("click",()=>closeTab(el.dataset.key));
  });
  const at = tb.querySelector(".etab.active");
  if(at) at.scrollIntoView({block:"nearest",inline:"nearest"});
}
function tab(key,label,accent,closable){
  const a = activeKey===key?"active":"";
  return `<div class="etab ${a}" data-key="${key}" style="--tabaccent:${accent||'var(--accent)'}">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="${accent||'#888'}"><rect x="2" y="2" width="12" height="12" rx="2"/></svg>
    <span class="ti">${esc(label)}</span>${closable?'<button class="x" title="Close">×</button>':''}</div>`;
}
function closeTab(key){
  openTabs=openTabs.filter(t=>t.key!==key);
  if(activeKey===key) activeKey = openTabs.length?openTabs[openTabs.length-1].key:"welcome";
  renderTabs(); render();
}
/* set the viewer without polluting browser history (replace, not assign) */
let viewerUrl="about:blank";
function setViewer(url){
  const v=document.getElementById("viewer");
  viewerUrl=url;
  try{
    if(v.contentWindow && v.contentWindow.location){ v.contentWindow.location.replace(url); }
    else { v.src=url; }
  }catch(e){ v.src=url; }
}
let suppressHistory=false;
function activate(key){
  activeKey=key;renderTabs();render();
  if(!suppressHistory){
    try{ history.pushState({hubKey:key},"","#"+encodeURIComponent(key)); }catch(e){}
  }
}
function restoreKey(key){
  suppressHistory=true;
  try{
    if(key && key.startsWith("ch:")) openChapter(key.slice(3));
    else if(key && key.startsWith("mod:")) openModule(key.slice(4));
    else activate(key||"welcome");
  }finally{ suppressHistory=false; }
}
window.addEventListener("popstate",function(e){
  const key=(e.state && e.state.hubKey) || "welcome";
  restoreKey(key);
});

/* ===================== OPENERS ===================== */
function openChapter(id){
  const ch=DATA.chapters.find(c=>c.id===id);
  const key="ch:"+id;
  if(!openTabs.find(t=>t.key===key)) openTabs.push({key,label:ch.name,accent:ch.accent});
  activate(key);
}
function openModule(file, anchor){
  const m=MODS[file]; if(!m) return;
  const key="mod:"+file;
  const accent = m.kind==="kk"?m.chapter.accent:"#9d9d9d";
  const label = m.kind==="kk"?(m.num+" "+m.title):m.title;
  if(!openTabs.find(t=>t.key===key)) openTabs.push({key,label,accent});
  pendingAnchor = anchor || null;
  activate(key);
  document.querySelectorAll(".leaf").forEach(l=>l.classList.toggle("sel",l.dataset.file===file));
  const leaf=document.querySelector(`.leaf[data-file="${cssEsc(file)}"]`);
  if(leaf) leaf.closest(".grp")?.classList.add("open");
  if(isMobile()) closeMobileSidebar();
}
let pendingAnchor = null;

/* ===================== RENDER ===================== */
function render(){
  const c=document.getElementById("content");
  const v=document.getElementById("viewer");
  v.classList.remove("show"); c.style.display="block";

  if(activeKey==="welcome"){ setCurrentModule(null); setViewer("about:blank"); c.innerHTML=welcomeHTML(); wireCards(); return; }
  if(activeKey==="about"){ setCurrentModule(null); setViewer("about:blank"); c.innerHTML=aboutHTML(); return; }
  if(activeKey.startsWith("ch:")){ setCurrentModule(null); setViewer("about:blank"); c.innerHTML=chapterHTML(activeKey.slice(3)); wireKK(); return; }
  if(activeKey.startsWith("mod:")){
    const file=activeKey.slice(4); const m=MODS[file];
    if(isBuilt(file)){
      c.style.display="none";
      const target = pendingAnchor ? (file+"#"+pendingAnchor) : file;
      pendingAnchor=null;
      if(viewerUrl!==target){ setViewer(target); }
      v.classList.add("show");
      setCurrentModule(file);
    } else {
      setViewer("about:blank");
      c.innerHTML=mipHTML(m,file);
      setCurrentModule(null);
    }
    return;
  }
}

function wireCards(){
  document.querySelectorAll(".ccard[data-chapter]").forEach(el=>
    el.addEventListener("click",()=>openChapter(el.dataset.chapter)));
  document.querySelectorAll(".ccard[data-file]").forEach(el=>
    el.addEventListener("click",()=>openModule(el.dataset.file)));
  document.querySelectorAll(".card-pdf").forEach(el=>
    el.addEventListener("click",e=>{e.stopPropagation();dlPDF(el.dataset.pdf);}));
}

function chapterHTML(id){
  const ch=DATA.chapters.find(c=>c.id===id);
  const rows = ch.kk.map(k=>`
    <button class="kk-row ${isBuilt(k.file)?'is-built':''}" data-file="${k.file}">
      <span class="kn">${k.num}</span>
      <span class="kc"><h4>${esc(k.title)}</h4><p>${esc(k.blurb)}</p></span>
      <span class="kstatus">${isBuilt(k.file)?'ready':'soon'}</span>
      ${isBuilt(k.file)?`<span class="kk-pdf" data-pdf="pdfs/${k.file.replace('.html','.pdf')}" title="Download this topic as a PDF">⤓ PDF</span>`:''}
      <span class="karrow">→</span>
    </button>`).join("");
  return `<div class="pad" style="--caccent:${ch.accent}">
    <div class="ov-head">
      <span class="ov-badge">${ch.code}</span>
      <div class="ov-titles"><h2>${esc(ch.name)}</h2>
        <div class="ov-meta">${ch.unit} · ${ch.aos}</div></div>
    </div>
    <div class="ov-block"><div class="lbl">Outcome</div><p>${esc(ch.outcome)}</p></div>
    <div class="ov-block assess"><div class="lbl">Assessment</div><p>${esc(ch.assess)}</p></div>
    <div class="sect-h" style="margin-top:30px">Key knowledge · ${ch.kk.length} modules</div>
    <div class="kk-list">${rows}</div>
  </div>`;
}
function dlPDF(path){const a=document.createElement("a");a.href=path;a.setAttribute("download","");a.rel="noopener";document.body.appendChild(a);a.click();a.remove();}
function wireKK(){
  document.querySelectorAll(".kk-row").forEach(el=>
    el.addEventListener("click",()=>openModule(el.dataset.file)));
  document.querySelectorAll(".kk-pdf").forEach(el=>
    el.addEventListener("click",e=>{e.stopPropagation();dlPDF(el.dataset.pdf);}));
}

function mipHTML(m,file){
  const ch=m.chapter; const accent=ch?ch.accent:"#9d9d9d";
  const code = m.kind==="kk"?`${ch.code} · ${m.num}`:"Foundations";
  return `<div class="pad" style="--caccent:${accent}">
    <div class="mip">

/* deep-link inside the (same-origin) module iframe — handles scroll & data-go variants */
function gotoSection(anchor){
  if(!anchor) return;
  const ifr = document.getElementById("viewer");
  let done=false;
  try{
    const doc = ifr.contentDocument;
    if(doc){
      const navEl = doc.querySelector(`[data-go="${anchor}"],[data-target="${anchor}"],a[href="#${anchor}"]`);
      if(navEl){ navEl.click(); done=true; }
      const el = doc.getElementById(anchor);
      if(el){ el.scrollIntoView({behavior:"smooth",block:"start"}); done=true; }
    }
  }catch(e){/* cross-origin (shouldn't happen on same host) */}
  if(!done){
    try{ ifr.contentWindow.location.hash = anchor; }
    catch(e){ ifr.src = currentModuleFile + "#" + anchor; }
  }
}

/* track scroll position inside the iframe to highlight the current section */
function attachViewerSpy(){
  const ifr = document.getElementById("viewer");
  ifr.addEventListener("load",()=>{
    if(!currentModuleFile) return;
    try{
      const win = ifr.contentWindow, doc = ifr.contentDocument;
      if(!doc) return;
      const toc = CONTENT.toc[currentModuleFile]||[];
      const ids = toc.map(e=>e[0]).filter(Boolean);
      if(!ids.length) return;
      const onScroll = ()=>{
        let cur=ids[0], best=-Infinity;
        ids.forEach(id=>{
          const el=doc.getElementById(id); if(!el) return;
          const top = el.getBoundingClientRect().top;
          if(top<=120 && top>best){ best=top; cur=id; }
        });
        markCurrentSection(cur);
      };
      win.addEventListener("scroll",onScroll,{passive:true});
      onScroll();
    }catch(e){}
  });
}


/* ===================================================================
   ASK THIS SITE — offline BM25 search + local Llama 3.2 (WebLLM)
   =================================================================== */
const STOP = new Set(("a an the of to in on and or is are was were be been being for with as at by " +
  "this that these those it its it's from into over under about than then so but if not no nor can " +
  "will would should could may might must do does did has have had you your they them their our we i").split(" "));
function tok(s){ return ((s||"").toLowerCase().match(/[a-z0-9]+/g)||[]).filter(w=>w.length>1 && !STOP.has(w)); }
function stem(w){ return w.replace(/(ies|ied)$/,"y").replace(/(es|ed|ing|s)$/,""); }

/* build BM25 index from CONTENT.idx = [file, anchor, sect, text] */
const DOCS = CONTENT.idx.map(c=>{
  const toks = tok(c[2]+" "+c[2]+" "+c[3]).map(stem);   // weight section title x2
  return {file:c[0], anchor:c[1], sect:c[2], text:c[3], toks};
});
const DF = Object.create(null);
DOCS.forEach(d=>{ new Set(d.toks).forEach(t=>DF[t]=(DF[t]||0)+1); });
const NDOC = DOCS.length;
const AVGDL = DOCS.reduce((a,d)=>a+d.toks.length,0)/Math.max(1,NDOC);
const K1=1.5, B=0.75;
function idf(t){ const n=DF[t]||0; return Math.log(1+(NDOC-n+0.5)/(n+0.5)); }
function bm25(qToks,d){
  const tf=Object.create(null); d.toks.forEach(t=>tf[t]=(tf[t]||0)+1);
  const dl=d.toks.length; let s=0;
  qToks.forEach(t=>{ const f=tf[t]; if(!f) return;
    s += idf(t)*(f*(K1+1))/(f+K1*(1-B+B*dl/AVGDL)); });
  return s;
}
function siteSearch(q,k=8){
  const qt = tok(q).map(stem);
  if(!qt.length) return [];
  const scored = DOCS.map((d,i)=>({i,s:bm25(qt,d)})).filter(x=>x.s>0).sort((a,b)=>b.s-a.s);
  // de-duplicate by file but keep best section per file among the very top
  const out=[]; const seen=new Set();
  for(const x of scored){
    const d=DOCS[x.i];
    const key=d.file+"#"+d.anchor;
    if(seen.has(key)) continue; seen.add(key);
    out.push({...d, score:x.s});
    if(out.length>=k) break;
  }
  return out;
}
function snippet(text,q){
  const terms = tok(q).map(stem);
  const words = text.split(/\s+/);
  // find first window containing a query term
  let hit = words.findIndex(w=>terms.includes(stem(w.toLowerCase().replace(/[^a-z0-9]/gi,""))));
  if(hit<0) hit=0;
  const start=Math.max(0,hit-10);
  let frag = words.slice(start,start+34).join(" ");
  frag = esc(frag);
  terms.forEach(t=>{ if(t.length<2) return;
    frag = frag.replace(new RegExp("\\b("+t.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"[a-z]*)\\b","gi"),"<mark>$1</mark>");
  });
  return (start>0?"… ":"")+frag+(start+34<words.length?" …":"");
}

/* lightweight markdown -> html for AI answers (bold, code, lists) */
function mdLite(s){
  s=esc(s);
  s=s.replace(/\*\*(.+?)\*\*/g,"<b>$1</b>").replace(/`([^`]+)`/g,"<code>$1</code>");
  s=s.replace(/\[(\d+)\]/g,'<span class="cite" data-cite="$1">$1</span>');
  return s;
}

function onLLMProgress(pct,text){
  const prog=document.getElementById("aiProg");
  prog.classList.add("show");
  document.getElementById("aiProgBar").style.width=Math.max(2,pct)+"%";
  document.getElementById("aiProgTxt").textContent=text||(pct+"%");
}

async function loadLLM(){
  if(llmEngine) return llmEngine;
  if(llmLoading) return null;
  if(!webgpuOK()){ updateModeUI(); return null; }
  llmLoading=true;
  const btn=document.getElementById("aiLoadBtn");
  btn.disabled=true; btn.textContent="Loading…";
  document.getElementById("modeNote").innerHTML="Loading Llama 3.2 — keep this tab open.";
  try{
    if(!webllmMod) webllmMod = await import("https://esm.run/@mlc-ai/web-llm");
    onLLMProgress(1,"Initialising…");
    llmEngine = await webllmMod.CreateMLCEngine(MODEL_ID,{
      initProgressCallback:(r)=>{
        const pct=Math.round((r.progress||0)*100);
        onLLMProgress(pct, r.text || `Loading: ${pct}%`);
      }
    });
    llmReady=true; llmLoading=false;
    onLLMProgress(100,"Ready");
    setTimeout(()=>document.getElementById("aiProg").classList.remove("show"),900);
    updateModeUI();
    return llmEngine;
  }catch(err){
    llmLoading=false;
    document.getElementById("aiProgTxt").textContent="Couldn't load the model.";
    document.getElementById("modeNote").innerHTML='<span style="color:var(--rose)">Model failed to load.</span> Check your connection (the first load needs internet to fetch the model), then try again.';
    btn.disabled=false; btn.textContent="Retry";
    console.error(err);
    return null;
  }
}

function buildSystemPrompt(){
  return "You are \"Ask this site\", a concise study assistant built into the Digital Vector VCE Environmental Science Units 3 & 4 revision hub. "+
    "Answer the student's question using ONLY the numbered context passages from the site. "+
    "Be accurate to the VCAA Environmental Science Study Design (2022–2026) and use Australian spelling. "+
    "Keep answers focused and exam-relevant. When you use a passage, cite it inline like [1] or [2]. "+
    "If the context doesn't contain the answer, say so briefly and name the most relevant module to open. Do not invent facts.";
}

async function askLLM(q){
  const eng = await loadLLM();
  if(!eng) return;
  const hits = siteSearch(q,5);
  const ctx = hits.map((h,i)=>`[${i+1}] ${modLabel(h.file)} (${modCode(h.file)})${h.sect?" — "+h.sect:""}\n${h.text}`).join("\n\n");
  const userMsg = `Context passages:\n${ctx}\n\nStudent question: ${q}`;

  const bub = addBubble("bot",`<span class="typing"><i></i><i></i><i></i></span>`);
  let acc="";
  try{
    const messages=[{role:"system",content:buildSystemPrompt()}];
    // include a little prior turn context
    chatHistory.slice(-4).forEach(m=>messages.push(m));
    messages.push({role:"user",content:userMsg});
    const stream = await eng.chat.completions.create({messages,stream:true,temperature:0.2,max_tokens:900});
    for await (const chunk of stream){
      const delta = chunk.choices?.[0]?.delta?.content || "";
      if(delta){ acc+=delta; bub.innerHTML=mdLite(acc); bub.parentElement.parentElement.scrollTop=1e9; }
    }
  }catch(err){
    bub.innerHTML='Something interrupted the answer. Try again.';
    console.error(err); return;
  }
  chatHistory.push({role:"user",content:q});
  chatHistory.push({role:"assistant",content:acc});

  // sources
  if(hits.length){
    const chips=document.createElement("div");
    chips.className="src-chips";
    chips.innerHTML=hits.map((h,i)=>`<button class="src-chip" data-file="${h.file}" data-anchor="${esc(h.anchor)}"><span class="sc-n">${i+1}</span>${esc(modLabel(h.file))}</button>`).join("");
    bub.appendChild(chips);
    chips.querySelectorAll(".src-chip").forEach(c=>c.addEventListener("click",()=>openModule(c.dataset.file,c.dataset.anchor||null)));
  }
  // wire inline citation chips
  bub.querySelectorAll(".cite").forEach(c=>{
    const n=parseInt(c.dataset.cite,10)-1; const h=hits[n];
    if(h) c.addEventListener("click",()=>openModule(h.file,h.anchor||null));
  });
}

/* ===================== RESIZE / COLLAPSE ===================== */
function makeResizer(handleId, varName, target, side){
  const handle=document.getElementById(handleId);
  let startX, startW;
  function down(e){
    if(isMobile()) return;
    e.preventDefault();
    handle.classList.add("drag");
    startX=(e.touches?e.touches[0].clientX:e.clientX);
    startW=parseInt(getComputedStyle(document.documentElement).getPropertyValue(varName))||target.offsetWidth;
    document.body.style.cursor="col-resize"; document.body.style.userSelect="none";
    window.addEventListener("mousemove",move); window.addEventListener("mouseup",up);
    window.addEventListener("touchmove",move,{passive:false}); window.addEventListener("touchend",up);
  }
  function move(e){
    const x=(e.touches?e.touches[0].clientX:e.clientX);
    let dw = side==="left" ? (x-startX) : (startX-x);
    let w = Math.max(parseInt(getComputedStyle(target).minWidth)||200,
            Math.min(parseInt(getComputedStyle(target).maxWidth)||680, startW+dw));
    document.documentElement.style.setProperty(varName, w+"px");
  }
  function up(){
    handle.classList.remove("drag");
    document.body.style.cursor=""; document.body.style.userSelect="";
    window.removeEventListener("mousemove",move); window.removeEventListener("mouseup",up);
    window.removeEventListener("touchmove",move); window.removeEventListener("touchend",up);
    try{ localStorage.setItem("es34-"+varName, getComputedStyle(document.documentElement).getPropertyValue(varName)); }catch(e){}
  }
  handle.addEventListener("mousedown",down);
  handle.addEventListener("touchstart",down,{passive:false});
  // double-click resets
  handle.addEventListener("dblclick",()=>{ document.documentElement.style.removeProperty(varName);
    try{localStorage.removeItem("es34-"+varName);}catch(e){} });
}

/* ===================== TREE SEARCH (key knowledge) ===================== */
const search=document.getElementById("search");
const sclear=document.getElementById("sclear");
search.addEventListener("input",()=>{
  const q=search.value.trim().toLowerCase();
  sclear.style.display=q?"block":"none";
  document.querySelectorAll(".grp").forEach(g=>{
    let any=false;
    g.querySelectorAll(".leaf").forEach(l=>{
      const hay = (l.dataset.search || l.querySelector(".kt").textContent.toLowerCase());
      const hit = !q || hay.includes(q) || l.querySelector(".knum").textContent.toLowerCase().includes(q);
      l.style.display = hit?"flex":"none"; if(hit) any=true;
    });
    g.style.display = any?"block":"none";
    if(q && any) g.classList.add("open");
  });
  document.querySelectorAll(".unit-label").forEach(u=>u.style.display=q?"none":"block");
});
sclear.addEventListener("click",()=>{search.value="";search.dispatchEvent(new Event("input"));search.focus();});

/* ===================== THEME + FONT ===================== */
const root=document.documentElement;
function setTheme(t){
  root.dataset.theme=t;
  document.getElementById("themeIcon").textContent = t==="dark"?"☾":"☀";
  document.getElementById("themeTxt").textContent = t==="dark"?"Dark":"Light";
  try{localStorage.setItem("es34-theme",t);}catch(e){}
}
document.getElementById("themeToggle").addEventListener("click",()=>setTheme(root.dataset.theme==="dark"?"light":"dark"));
let fs=15;
function applyViewerFont(){
  const v=document.getElementById("viewer");
  try{
    const doc=v&&v.contentDocument;
    if(doc&&doc.documentElement){
      doc.documentElement.style.setProperty("--fs",fs+"px"); // modules read --fs
      doc.documentElement.style.zoom=(fs/15);                // universal fallback (foundations etc.)
    }
  }catch(e){}
}
function setFont(n){fs=Math.max(12,Math.min(20,n));root.style.setProperty("--fs",fs+"px");applyViewerFont();try{localStorage.setItem("es34-fs",fs);}catch(e){}}
document.getElementById("fontUp").addEventListener("click",()=>setFont(fs+1));
document.getElementById("fontDown").addEventListener("click",()=>setFont(fs-1));
document.getElementById("viewer").addEventListener("load",applyViewerFont);

/* ===================== WIRING ===================== */
document.getElementById("askToggle").addEventListener("click",toggleChat);
document.getElementById("stAsk").addEventListener("click",openChat);
document.getElementById("chatClose").addEventListener("click",closeChat);
document.getElementById("chatClear").addEventListener("click",()=>{
  chatHistory=[]; document.getElementById("chatBody").innerHTML=""; renderChatEmpty();
});
document.getElementById("chatMode").addEventListener("click",e=>{
  const b=e.target.closest("button[data-mode]"); if(!b) return;
  chatMode=b.dataset.mode;
  try{localStorage.setItem("es34-chatmode",chatMode);}catch(e){}
  updateModeUI();
});
document.getElementById("aiLoadBtn").addEventListener("click",loadLLM);

const chatInput=document.getElementById("chatInput");
chatInput.addEventListener("input",()=>autoGrow(chatInput));
chatInput.addEventListener("keydown",e=>{
  if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); submitChat(chatInput.value); }
});
document.getElementById("chatSend").addEventListener("click",()=>submitChat(chatInput.value));

document.getElementById("hamburger").addEventListener("click",openMobileSidebar);
document.getElementById("sbClose").addEventListener("click",closeMobileSidebar);
document.getElementById("backdrop").addEventListener("click",()=>{ closeMobileSidebar(); closeChat(); });

window.addEventListener("resize",()=>{
  const onMobile=isMobile();
  document.getElementById("chatResize").classList.toggle("hidden", onMobile || document.getElementById("chatPanel").classList.contains("collapsed"));
  if(!onMobile){ document.getElementById("backdrop").classList.remove("show");
    document.getElementById("sidebar").classList.remove("mobile-open");
    document.getElementById("chatPanel").classList.remove("mobile-open"); }
});

/* ===================== INIT ===================== */
(function init(){
  try{
    const st=localStorage.getItem("es34-theme"); setTheme(st||"dark");
    const sfs=parseInt(localStorage.getItem("es34-fs")); if(sfs) setFont(sfs);
    const sw=localStorage.getItem("es34---sidebar-w"); if(sw) root.style.setProperty("--sidebar-w",sw.trim());
    const cw=localStorage.getItem("es34---chat-w"); if(cw) root.style.setProperty("--chat-w",cw.trim());
    const cm=localStorage.getItem("es34-chatmode"); if(cm==="ai"||cm==="search") chatMode=cm;
  }catch(e){ setTheme("dark"); }

  buildTree();
  renderTabs();
  attachViewerSpy();
  render();
  try{ history.replaceState({hubKey:activeKey},"","#"+encodeURIComponent(activeKey)); }catch(e){}
  updateModeUI();
  makeResizer("sbResize","--sidebar-w",document.getElementById("sidebar"),"left");
  makeResizer("chatResize","--chat-w",document.getElementById("chatPanel"),"right");
})();

</script>
